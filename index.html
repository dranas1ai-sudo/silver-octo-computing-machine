<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Planner - V9 Ultimate Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #010103;
            --surface-color: rgba(10, 10, 15, 0.4);
            --surface-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #8492a6;
            --primary-color: #0ea5e9; 
            --danger-color: #ef4444;
            --success-color: #10b981;
            --font-en: 'Outfit', sans-serif;
            --font-ar: 'Tajawal', sans-serif;
            --transition: all 0.5s cubic-bezier(0.3, 0.8, 0.3, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html[dir="rtl"] { font-family: var(--font-ar); }
        html[dir="ltr"] { font-family: var(--font-en); }
        body { font-family: inherit; color: var(--text-primary); overflow-x: hidden; min-height: 100vh; background-color: var(--bg-color); }

        /* --- V9 Advanced Professional Background --- */
        #neural-background {
            position: fixed; inset: 0; z-index: -2;
            background: 
                radial-gradient(circle at 50% 10%, rgba(14, 165, 233, 0.1) 0%, rgba(1,1,3,1) 60%),
                radial-gradient(circle at 50% 50%, #010103 0%, #000 100%);
        }
        
        /* تأثير النبض الكوني المستمر */
        #neural-stars {
            position: fixed; inset: 0; z-index: -1;
            background-image: 
                radial-gradient(#fff 1px, transparent 1px),
                radial-gradient(#fff 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            opacity: 0.1;
            animation: starsPulse 10s infinite linear;
        }

        /* تصميم الوجه الغامض والمخ المتوهج - دقة فائقة */
        #brain-pulse-facade {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1);
            width: 300px; height: 300px; z-index: -1;
            filter: drop-shadow(0 0 30px rgba(14, 165, 233, 0.2));
            transition: var(--transition);
        }

        /* العيون كشقوق مضيئة */
        .facade-eye {
            position: absolute; top: 40%; width: 50px; height: 12px;
            border-radius: 50%; background: var(--primary-color);
            box-shadow: 0 0 20px 5px var(--primary-color);
            transition: var(--transition);
        }
        .facade-eye.left { left: 20%; }
        .facade-eye.right { right: 20%; }

        /* المخ المتوهج */
        #facade-brain-pulse {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1);
            width: 200px; height: 200px;
            background: 
                radial-gradient(circle at 50% 50%, var(--primary-color) 0%, transparent 70%);
            border-radius: 50%;
            transition: var(--transition);
            animation: constantPulse 4s infinite ease-in-out;
            box-shadow: 
                inset 0 0 20px var(--primary-color),
                0 0 40px rgba(14, 165, 233, 0.4);
        }

        /* الأوردة العصبية المتوهجة (لمسة احترافية دقيقة) */
        .brain-nerve {
            position: absolute; top: 50%; left: 50%;
            width: 150px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
            opacity: 0.2;
            transition: var(--transition);
        }

        /* توهج وحركة المخ عند التفعيل (سريع ودرامي) */
        .trigger-brain-facade {
            transform: translate(-50%, -50%) scale(1.1) !important;
            filter: drop-shadow(0 0 60px rgba(14, 165, 233, 0.6)) brightness(1.6) !important;
        }
        .trigger-eye-facade {
            box-shadow: 0 0 50px 15px var(--primary-color) !important;
        }

        @keyframes starsPulse {
            0% { transform: translateY(0); opacity: 0.1; }
            50% { transform: translateY(-10px); opacity: 0.2; }
            100% { transform: translateY(0); opacity: 0.1; }
        }

        @keyframes constantPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 30px rgba(14, 165, 233, 0.3); filter: brightness(1); }
            50% { transform: translate(-50%, -50%) scale(1.02); box-shadow: 0 0 50px rgba(14, 165, 233, 0.5); filter: brightness(1.2); }
        }

        /* --- Intro Animation --- */
        #intro-overlay {
            position: fixed; inset: 0; background-color: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            animation: fadeOutIntro 1s forwards; animation-delay: 1s;
        }
        .intro-loader {
            width: 50px; height: 50px; border-radius: 50%;
            border: 2px solid var(--primary-color);
            border-top-color: transparent;
            animation: spin 1s infinite linear;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeOutIntro { to { opacity: 0; visibility: hidden; } }

        /* --- Toast Notifications --- */
        .toast-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .toast {
            background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(10px);
            border: 1px solid var(--surface-border); color: white;
            padding: 12px 24px; border-radius: 30px; font-size: 0.95rem; font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease forwards, fadeOut 0.3s ease 2.7s forwards;
        }
        .toast.error { border-color: var(--danger-color); box-shadow: 0 5px 20px rgba(239, 68, 68, 0.2); }
        .toast.success { border-color: var(--success-color); box-shadow: 0 5px 20px rgba(16, 185, 129, 0.2); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }

        /* --- Glass UI & Nav --- */
        .glass {
            background: var(--surface-color); backdrop-filter: blur(25px);
            border: 1px solid var(--surface-border); border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 5%; position: sticky; top: 0; z-index: 100;
            background: rgba(3, 3, 5, 0.6); backdrop-filter: blur(25px); border-bottom: 1px solid var(--surface-border);
        }

        .brand h1 { font-size: 1.3rem; font-weight: 700; color: var(--primary-color); }
        .brand span { font-size: 0.7rem; color: var(--text-secondary); }
        .nav-actions { display: flex; gap: 10px; align-items: center; }

        button { cursor: pointer; border: none; outline: none; font-family: inherit; transition: var(--transition); }
        
        .btn-primary {
            background: rgba(255, 255, 255, 0.04); border: 1px solid var(--surface-border);
            color: white; padding: 9px 18px; border-radius: 10px; font-weight: 500; font-size: 0.85rem;
        }
        .btn-primary:hover { background: rgba(14, 165, 233, 0.1); border-color: var(--primary-color); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(14,165,233,0.2); }
        
        .btn-lang {
            display: flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,0.02); border: 1px solid var(--surface-border);
            color: white; padding: 7px 12px; border-radius: 20px; font-weight: bold; font-size: 0.8rem;
        }
        .btn-lang:hover { background: rgba(255,255,255,0.08); border-color: var(--primary-color); }
        .btn-lang svg { width: 14px; height: 14px; fill: currentColor; }

        main { padding: 40px 5%; max-width: 900px; margin: 0 auto; }
        .view { display: none; opacity: 0; transform: translateY(15px); transition: var(--transition); }
        .view.active { display: block; opacity: 1; transform: translateY(0); }

        /* --- Dashboard --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { padding: 22px; cursor: pointer; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.15); background: rgba(30, 30, 40, 0.6); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(14, 165, 233, 0.15); }

        /* --- Forms --- */
        .input-group { margin-bottom: 22px; }
        .input-group label { display: block; margin-bottom: 7px; color: var(--text-secondary); font-size: 0.85rem;}
        input {
            width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--surface-border);
            color: white; padding: 12px; border-radius: 10px; transition: var(--transition); font-family: inherit; font-size: 0.9rem;
        }
        input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 2px rgba(14,165,233,0.1); }
        
        .task-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        .task-row input[type="text"] { flex: 2; }
        .task-row input[type="time"] { flex: 1; }
        .btn-icon { width: 40px; height: 40px; flex-shrink: 0; border-radius: 8px; background: rgba(239,68,68,0.1); color: var(--danger-color); font-size: 0.8rem;}
        .btn-icon:hover { background: var(--danger-color); color: white; }

        /* --- Task Detail --- */
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; border-bottom: 1px solid var(--surface-border); }
        .task-item:last-child { border-bottom: none; }
        .task-info { display: flex; gap: 12px; align-items: center; }
        .task-time { color: #a78bfa; background: rgba(167, 139, 250, 0.1); padding: 4px 9px; border-radius: 6px; font-size: 0.8rem; font-weight: bold;}
        .task-name { font-size: 1rem; transition: var(--transition); }
        .task-name.done { text-decoration: line-through; color: var(--text-secondary); }
        
        .toggle-btn {
            width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--surface-border);
            display: flex; justify-content: center; align-items: center; background: transparent; flex-shrink: 0;
        }
        .toggle-btn.done { background: var(--success-color); border-color: var(--success-color); color: #000; box-shadow: 0 0 10px rgba(16,185,129,0.3); }
        .toggle-btn.done::after { content: '✓'; font-weight: bold; font-size: 0.8rem;}

        @media (max-width: 768px) {
            .task-row { flex-direction: column; }
            .task-row input, .task-row .btn-icon { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="neural-background"></div>
    <div id="neural-stars"></div>
    <div id="brain-pulse-facade">
        <div id="facade-brain-pulse"></div>
        <div class="facade-eye left"></div>
        <div class="facade-eye right"></div>
        <div class="facade-eye left" style="box-shadow: 0 0 15px 4px rgba(255,255,255,0.4);"></div>
        <div class="facade-eye right" style="box-shadow: 0 0 15px 4px rgba(255,255,255,0.4);"></div>
        <div class="brain-nerve" style="transform: translate(-50%, -50%) rotate(30deg);"></div>
        <div class="brain-nerve" style="transform: translate(-50%, -50%) rotate(-30deg);"></div>
        <div class="brain-nerve" style="transform: translate(-50%, -50%) rotate(90deg);"></div>
    </div>

    <div id="intro-overlay">
        <div class="intro-loader"></div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <nav>
        <div class="brand">
            <h1 data-i18n="title">Neural Planner</h1>
            <span data-i18n="subtitle">V5 • Mohammed Anas</span>
        </div>
        <div class="nav-actions">
            <button class="btn-lang" onclick="app.toggleLang()">
                <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2s.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c.96-1.66 2.49-2.93 4.33-3.56C8.81 5.55 8.35 6.75 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2s.07-1.35.16-2h4.68c.09.65.16 1.32.16 2s-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2s-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/></svg>
                <span id="langBtnText">EN</span>
            </button>
            <button class="btn-primary" onclick="app.switchView('dashboard')" data-i18n="home">Home</button>
        </div>
    </nav>

    <main>
        <div id="view-dashboard" class="view active">
            <div style="display: flex; justify-content: space-between; margin-bottom: 30px; align-items: center;">
                <h2 data-i18n="yourRoutines">Your Routine Architectures</h2>
                <button class="btn-primary" onclick="app.switchView('create')" data-i18n="newPlan" style="border: 1px dashed var(--primary-color);">+ New Plan</button>
            </div>
            <div id="tables-grid" class="grid"></div>
        </div>

        <div id="view-create" class="view glass" style="padding: 30px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 25px; align-items: center;">
                <h2 data-i18n="designPlan">Design New Plan</h2>
                <button class="btn-primary" style="color:var(--danger-color); border-color:rgba(239,68,68,0.3); background: rgba(239,68,68,0.05);" onclick="app.switchView('dashboard')" data-i18n="cancel">Cancel</button>
            </div>
            
            <div class="input-group">
                <label data-i18n="moduleTitle">Module Title</label>
                <input type="text" id="table-title" data-i18n-ph="titlePlaceholder" placeholder="e.g., Deep Work Protocol...">
            </div>

            <div class="input-group">
                <label data-i18n="defineSeq">Define Tasks List</label>
                <div id="task-list"></div>
                <button class="btn-primary" style="width: 100%; margin-top: 15px; border-style: dashed; padding: 12px;" onclick="app.addTaskRow()" data-i18n="addNode">+ Add New Task</button>
            </div>

            <div style="text-align: end; margin-top: 35px; border-top: 1px solid var(--surface-border); padding-top: 25px;">
                <button class="btn-primary" style="background: var(--primary-color); color: #000; font-weight: bold; padding: 12px 30px;" onclick="app.saveTable()" data-i18n="launch">Launch Routine ✓</button>
            </div>
        </div>

        <div id="view-detail" class="view">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <div>
                    <button class="btn-primary" style="margin-bottom: 10px;" onclick="app.switchView('dashboard')" data-i18n="back">← Back</button>
                    <h2 id="detail-title">Plan Details</h2>
                </div>
                <button class="btn-primary" style="color:var(--danger-color); border-color:rgba(239,68,68,0.3); background: rgba(239,68,68,0.05);" onclick="app.deleteCurrentTable()" data-i18n="delete">🗑 Delete</button>
            </div>
            <div class="glass" id="detail-body" style="padding: 10px 0;"></div>
        </div>
    </main>

    <script>
        const translations = {
            en: {
                title: "Neural Planner", subtitle: "V5 • Mohammed Anas",
                home: "Home", newPlan: "+ New Plan", yourRoutines: "Your Routine Architectures",
                noRoutines: "No routine architectures initialized. System is ready.",
                designPlan: "Design New Plan", cancel: "Cancel", moduleTitle: "Module Title",
                titlePlaceholder: "e.g., Deep Work Protocol...", defineSeq: "Define Tasks",
                addNode: "+ Add New Task", taskPlaceholder: "Task description...",
                launch: "Launch Routine ✓", back: "← Back", delete: "🗑 Delete Plan",
                emptyAlert: "System must define at least one task to save.",
                confirmDelete: "Permanently delete this plan?",
                tasksLabel: "Tasks", doneLabel: "Completed"
            },
            ar: {
                title: "المخطط العصبي", subtitle: "الإصدار الخامس • محمد أنس",
                home: "الرئيسية", newPlan: "+ خطة جديدة", yourRoutines: "خططك اليومية",
                noRoutines: "لا توجد خطط حالياً. النظام جاهز للعمل.",
                designPlan: "تصميم خطة جديدة", cancel: "إلغاء", moduleTitle: "عنوان الخطة",
                titlePlaceholder: "مثال: روتين العمل العميق...", defineSeq: "قائمة المهام",
                addNode: "+ إضافة مهمة جديدة", taskPlaceholder: "اكتب تفاصيل المهمة هنا...",
                launch: "حفظ الخطة ✓", back: "← رجوع", delete: "🗑 حذف الخطة",
                emptyAlert: "عفواً، يجب كتابة مهمة واحدة على الأقل قبل الحفظ!",
                confirmDelete: "هل أنت متأكد من الحذف النهائي لهذه الخطة؟",
                tasksLabel: "مهام", doneLabel: "مكتملة"
            }
        };

        const audio = {
            ctx: null,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            play(type) {
                this.init(); if (!this.ctx) return;
                const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                const t = this.ctx.currentTime;
                if (type === 'tap') {
                    osc.frequency.setValueAtTime(600, t); osc.frequency.exponentialRampToValueAtTime(300, t+0.05);
                    gain.gain.setValueAtTime(0.08, t); gain.gain.exponentialRampToValueAtTime(0.001, t+0.05);
                    osc.start(t); osc.stop(t+0.05);
                } else if (type === 'success') {
                    osc.frequency.setValueAtTime(400, t); osc.frequency.setValueAtTime(800, t+0.1);
                    gain.gain.setValueAtTime(0.05, t); gain.gain.linearRampToValueAtTime(0, t+0.3);
                    osc.start(t); osc.stop(t+0.3);
                }
            }
        };

        ['click', 'touchstart'].forEach(e => document.addEventListener(e, () => audio.init(), {once:true}));

        const app = {
            data: [], currentId: null, lang: localStorage.getItem('appLang') || 'en',

            init() {
                setTimeout(() => document.getElementById('intro-overlay')?.remove(), 1000);
                this.applyLang();
                const stored = localStorage.getItem('plannerV9');
                if (stored) this.data = JSON.parse(stored);
                this.switchView('dashboard');
            },

            // دالة تفعيل نبضة المخ الاحترافية الفائقة
            triggerNeuralGlow() {
                const facade = document.getElementById('brain-pulse-facade');
                const eyes = document.querySelectorAll('.facade-eye');
                
                facade.classList.add('trigger-brain-facade');
                eyes.forEach(e => e.classList.add('trigger-eye-facade'));
                
                // نبضة ضوئية حادة تتلاشى ببطء لتعطي إحساساً "بالدقة والاحترافية 4k"
                setTimeout(() => {
                    facade.classList.remove('trigger-brain-facade');
                    eyes.forEach(e => e.classList.remove('trigger-eye-facade'));
                }, 800);
            },

            showToast(msgKey, type = 'success') {
                const msg = translations[this.lang][msgKey] || msgKey;
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `${type === 'success' ? '✅' : '⚠️'} ${msg}`;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            },

            toggleLang() {
                audio.play('tap');
                this.lang = this.lang === 'en' ? 'ar' : 'en';
                localStorage.setItem('appLang', this.lang);
                this.applyLang();
                if(document.getElementById('view-dashboard').classList.contains('active')) this.renderDash();
                else if(document.getElementById('view-create').classList.contains('active')) this.updatePlaceholders();
            },

            applyLang() {
                document.documentElement.dir = this.lang === 'ar' ? 'rtl' : 'ltr';
                document.documentElement.lang = this.lang;
                document.getElementById('langBtnText').innerText = this.lang === 'en' ? 'EN' : 'AR';
                
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (translations[this.lang][key]) el.innerHTML = translations[this.lang][key];
                });
                this.updatePlaceholders();
            },

            updatePlaceholders() {
                document.querySelectorAll('[data-i18n-ph]').forEach(el => {
                    const key = el.getAttribute('data-i18n-ph');
                    if (translations[this.lang][key]) el.placeholder = translations[this.lang][key];
                });
            },

            switchView(view) {
                audio.play('tap');
                document.querySelectorAll('.view').forEach(v => { v.classList.remove('active'); setTimeout(() => v.style.display='none', 300); });
                const target = document.getElementById(`view-${view}`);
                setTimeout(() => { target.style.display='block'; void target.offsetWidth; target.classList.add('active'); }, 300);
                
                if (view === 'dashboard') this.renderDash();
                else if (view === 'create') {
                    document.getElementById('table-title').value = '';
                    document.getElementById('task-list').innerHTML = '';
                    this.addTaskRow();
                }
            },

            renderDash() {
                const grid = document.getElementById('tables-grid');
                grid.innerHTML = '';
                if (!this.data.length) {
                    grid.innerHTML = `<div class="glass" style="grid-column:1/-1; padding:50px; text-align:center; color:var(--text-secondary); font-size:1rem;">${translations[this.lang].noRoutines}</div>`;
                    return;
                }
                
                const tLang = translations[this.lang];
                
                this.data.forEach(item => {
                    const done = item.tasks.filter(t => t.status === 'completed').length;
                    const total = item.tasks.length;
                    
                    const card = document.createElement('div');
                    card.className = 'card glass';
                    card.onclick = () => { audio.play('tap'); this.open(item.id); };
                    
                    card.innerHTML = `
                        <div style="border-bottom:1px solid var(--surface-border); padding-bottom:10px;">
                            <div style="font-size:1.1rem; font-weight:600; line-height: 1.4; word-wrap: break-word; color:var(--text-primary);">${this.esc(item.title)}</div>
                        </div>
                        <div style="display:flex; justify-content:space-between; color:var(--text-secondary); font-size:0.85rem; margin-top:12px; font-weight: 500;">
                            <span>📋 ${total} ${tLang.tasksLabel}</span>
                            <span style="color:var(--success-color);">✓ ${done} ${tLang.doneLabel}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            },

            addTaskRow() {
                audio.play('tap');
                const list = document.getElementById('task-list');
                const row = document.createElement('div');
                row.className = 'task-row';
                const placeholder = translations[this.lang].taskPlaceholder;
                row.innerHTML = `
                    <input type="text" class="t-name" placeholder="${placeholder}" required>
                    <input type="time" class="t-time" required>
                    <button class="btn-icon" onclick="audio.play('tap'); this.parentElement.remove()">✕</button>
                `;
                list.appendChild(row);
            },

            saveTable() {
                const title = document.getElementById('table-title').value.trim() || `Protocol_${Math.floor(Math.random()*1000)}`;
                const rows = document.querySelectorAll('#task-list .task-row');
                const tasks = [];

                rows.forEach(r => {
                    const name = r.querySelector('.t-name').value.trim();
                    const time = r.querySelector('.t-time').value;
                    if (name) tasks.push({ name, time: time || '--:--', status: 'pending' });
                });

                if (tasks.length === 0) {
                    this.showToast('emptyAlert', 'error');
                    return;
                }

                audio.play('success');
                this.triggerNeuralGlow(); // <-- تفعيل نبضة المخ السينمائية الفائقة!
                this.data.unshift({ id: Date.now().toString(), title, tasks });
                localStorage.setItem('plannerV9', JSON.stringify(this.data));
                this.switchView('dashboard');
                this.showToast(this.lang === 'ar' ? 'تم حفظ الخطة بنجاح!' : 'Plan saved successfully!', 'success');
            },

            open(id) {
                this.currentId = id;
                const item = this.data.find(i => i.id === id);
                if (!item) return;

                document.getElementById('detail-title').textContent = item.title;
                const body = document.getElementById('detail-body');
                body.innerHTML = '';

                item.tasks.forEach((t, idx) => {
                    const isDone = t.status === 'completed';
                    const row = document.createElement('div');
                    row.className = 'task-item';
                    row.innerHTML = `
                        <div class="task-info">
                            <span class="task-time">${this.esc(t.time)}</span>
                            <span class="task-name ${isDone ? 'done' : ''}">${this.esc(t.name)}</span>
                        </div>
                        <button class="toggle-btn ${isDone ? 'done' : ''}" onclick="app.toggle(${idx})"></button>
                    `;
                    body.appendChild(row);
                });
                this.switchView('detail');
            },

            toggle(idx) {
                const item = this.data.find(i => i.id === this.currentId);
                if (item) {
                    const isDone = item.tasks[idx].status === 'pending';
                    item.tasks[idx].status = isDone ? 'completed' : 'pending';
                    audio.play(isDone ? 'success' : 'tap');
                    
                    if(isDone) this.triggerNeuralGlow(); // <-- تفعيل النبضة عند إنجاز مهمة أيضاً!
                    
                    localStorage.setItem('plannerV9', JSON.stringify(this.data));
                    this.open(this.currentId);
                }
            },

            deleteCurrentTable() {
                if(confirm(translations[this.lang].confirmDelete)) {
                    audio.play('tap');
                    this.data = this.data.filter(i => i.id !== this.currentId);
                    localStorage.setItem('plannerV9', JSON.stringify(this.data));
                    this.switchView('dashboard');
                }
            },

            esc(str) { return str.replace(/[&<>'"]/g, tag => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[tag])); }
        };

        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
