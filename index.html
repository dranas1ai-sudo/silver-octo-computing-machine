<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Planner Pro - V6 Download Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030305;
            --surface-color: rgba(20, 20, 30, 0.45);
            --surface-border: rgba(255, 255, 255, 0.12);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary-color: #0ea5e9; 
            --danger-color: #f43f5e;
            --success-color: #10b981;
            --font-en: 'Outfit', sans-serif;
            --font-ar: 'Tajawal', sans-serif;
            --transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html[dir="rtl"] { font-family: var(--font-ar); }
        html[dir="ltr"] { font-family: var(--font-en); }
        body { font-family: inherit; color: var(--text-primary); overflow-x: hidden; min-height: 100vh; background-color: var(--bg-color); }

        /* --- Brain original animation & pulse --- */
        #brain-bg {
            position: fixed; inset: 0; z-index: -2;
            background-image: url('brain.gif');
            background-size: cover; background-position: center;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.6s ease;
        }
        
        #brain-overlay {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 0%, rgba(5,5,8,0.6) 0%, rgba(0,0,0,0.85) 100%);
            backdrop-filter: blur(2px);
            transition: background 0.6s ease;
        }

        .brain-pulse { transform: scale(1.08); filter: brightness(1.6) contrast(1.3) saturate(1.4); }
        .overlay-pulse { background: radial-gradient(circle at 50% 0%, rgba(14, 165, 233, 0.4) 0%, rgba(0,0,0,0.8) 100%) !important; }

        /* --- Intro Animation --- */
        #intro-overlay {
            position: fixed; inset: 0; background-color: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            animation: fadeOutIntro 1s forwards; animation-delay: 2s;
        }
        .eyes-container { display: flex; gap: 40px; align-items: center; }
        .eye { width: 45px; height: 12px; background-color: var(--primary-color); border-radius: 50%; box-shadow: 0 0 25px 5px var(--primary-color); animation: pulseEye 2s infinite, blinkEye 4s infinite; }
        @keyframes pulseEye { 0%, 100% { box-shadow: 0 0 15px 2px var(--primary-color); transform: scale(1); opacity: 0.8; } 50% { box-shadow: 0 0 40px 10px var(--primary-color); transform: scale(1.05); opacity: 1; } }
        @keyframes blinkEye { 0%, 96%, 98%, 100% { transform: scaleY(1); } 97%, 99% { transform: scaleY(0.1); } }
        @keyframes fadeOutIntro { to { opacity: 0; visibility: hidden; } }

        /* --- Toast Notifications --- */
        .toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 1000; }
        .toast { background: rgba(20, 20, 30, 0.9); backdrop-filter: blur(10px); border: 1px solid var(--surface-border); color: white; padding: 12px 24px; border-radius: 30px; font-size: 0.95rem; font-weight: 500; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideUp 0.3s ease forwards, fadeOut 0.3s ease 2.7s forwards; }
        .toast.error { border-color: var(--danger-color); box-shadow: 0 5px 20px rgba(244, 63, 94, 0.2); }
        .toast.success { border-color: var(--success-color); box-shadow: 0 5px 20px rgba(16, 185, 129, 0.2); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }

        /* --- Glass UI & Nav --- */
        .glass { background: var(--surface-color); backdrop-filter: blur(20px); border: 1px solid var(--surface-border); border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05); }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; position: sticky; top: 0; z-index: 100; background: rgba(3, 3, 5, 0.6); backdrop-filter: blur(20px); border-bottom: 1px solid var(--surface-border); }
        .brand h1 { font-size: 1.4rem; font-weight: 700; color: var(--primary-color); }
        .brand span { font-size: 0.75rem; color: var(--text-secondary); }
        .nav-actions { display: flex; gap: 12px; align-items: center; }

        button { cursor: pointer; border: none; outline: none; font-family: inherit; transition: var(--transition); }
        .btn-primary { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--surface-border); color: white; padding: 10px 20px; border-radius: 12px; font-weight: 500; font-size: 0.9rem; }
        .btn-primary:hover { background: rgba(14, 165, 233, 0.1); border-color: var(--primary-color); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(14,165,233,0.2); }
        .btn-lang { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.03); border: 1px solid var(--surface-border); color: white; padding: 8px 16px; border-radius: 30px; font-weight: bold; font-size: 0.85rem; }
        .btn-lang:hover { background: rgba(255,255,255,0.1); border-color: var(--primary-color); transform: scale(1.05); }
        .btn-lang svg { width: 16px; height: 16px; fill: currentColor; }

        main { padding: 40px 5%; max-width: 1000px; margin: 0 auto; }
        .view { display: none; opacity: 0; transform: translateY(15px); transition: var(--transition); }
        .view.active { display: block; opacity: 1; transform: translateY(0); }

        /* --- Dashboard & Cards --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { padding: 24px; cursor: pointer; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); background: rgba(30, 30, 40, 0.6); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(14, 165, 233, 0.1); }

        /* --- Forms & Profile Section --- */
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); }
        input { width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--surface-border); color: white; padding: 14px; border-radius: 12px; transition: var(--transition); font-family: inherit; }
        input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 3px rgba(14,165,233,0.2); }
        .task-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
        .task-row input[type="text"] { flex: 2; }
        .task-row input[type="time"] { flex: 1; }
        .btn-icon { width: 45px; height: 45px; flex-shrink: 0; border-radius: 10px; background: rgba(244,63,94,0.1); color: var(--danger-color); }
        .btn-icon:hover { background: var(--danger-color); color: white; }

        /* --- Task Detail --- */
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid var(--surface-border); }
        .task-item:last-child { border-bottom: none; }
        .task-info { display: flex; gap: 15px; align-items: center; }
        .task-time { color: #0ea5e9; background: rgba(14, 165, 233, 0.1); padding: 5px 10px; border-radius: 8px; font-size: 0.85rem; font-weight: bold;}
        .task-name { font-size: 1.05rem; transition: var(--transition); }
        .task-name.done { text-decoration: line-through; color: var(--text-secondary); }
        .toggle-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--surface-border); display: flex; justify-content: center; align-items: center; background: transparent; flex-shrink: 0; }
        .toggle-btn.done { background: var(--success-color); border-color: var(--success-color); color: #000; box-shadow: 0 0 15px rgba(16,185,129,0.4); }
        .toggle-btn.done::after { content: '✓'; font-weight: bold; }

        @media (max-width: 768px) {
            .task-row { flex-direction: column; }
            .task-row input, .task-row .btn-icon { width: 100%; }
            nav { padding: 15px 3%; }
            .brand h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div id="brain-bg"></div>
    <div id="brain-overlay"></div>

    <div id="intro-overlay">
        <div class="eyes-container"><div class="eye"></div><div class="eye"></div></div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <nav>
        <div class="brand">
            <h1 data-i18n="title">Neural Planner</h1>
            <span data-i18n="subtitle">V6 Pro Download Edition</span>
        </div>
        <div class="nav-actions">
            <button class="btn-lang" onclick="app.toggleLang()">
                <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2s.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c.96-1.66 2.49-2.93 4.33-3.56C8.81 5.55 8.35 6.75 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2s.07-1.35.16-2h4.68c.09.65.16 1.32.16 2s-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2s-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/></svg>
                <span id="langBtnText">EN</span>
            </button>
            <button class="btn-primary" onclick="app.switchView('dashboard')" data-i18n="home">Home</button>
        </div>
    </nav>

    <main>
        <div id="view-dashboard" class="view active">
            <div class="glass" style="padding: 20px; margin-bottom: 25px; display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                    <input type="text" id="user-name" data-i18n-ph="enterName" placeholder="Enter Your Name..." style="width: auto; flex-grow: 1; padding: 12px;">
                    <button class="btn-primary" onclick="app.saveProfile()" data-i18n="saveName">✓ Save Name</button>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--surface-border); padding-top: 15px;">
                    <h2 data-i18n="yourRoutines" style="font-weight: 500;">Your Routine Architectures</h2>
                    <button class="btn-primary btn-lang" onclick="app.downloadSummaryImage()">
                        🌐 <span data-i18n="downloadImage">Share Progress Card</span>
                    </button>
                </div>
            </div>
            
            <div id="tables-grid" class="grid"></div>
        </div>

        <div id="view-create" class="view glass" style="padding: 35px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 25px; align-items: center;">
                <h2 data-i18n="designPlan">Design New Plan</h2>
                <button class="btn-primary" style="color:var(--danger-color); border-color:rgba(244,63,94,0.3); background: rgba(244,63,94,0.05);" onclick="app.switchView('dashboard')" data-i18n="cancel">Cancel</button>
            </div>
            
            <div class="input-group">
                <label data-i18n="moduleTitle">Module Title</label>
                <input type="text" id="table-title" data-i18n-ph="titlePlaceholder" placeholder="e.g., Deep Work Protocol...">
            </div>

            <div class="input-group">
                <label data-i18n="defineSeq">Define Parameter Sequence</label>
                <div id="task-list"></div>
                <button class="btn-primary" style="width: 100%; margin-top: 15px; border-style: dashed; padding: 12px;" onclick="app.addTaskRow()" data-i18n="addNode">+ Add New Node</button>
            </div>

            <div style="text-align: end; margin-top: 35px; border-top: 1px solid var(--surface-border); padding-top: 25px;">
                <button class="btn-primary" style="background: var(--primary-color); color: #000; font-weight: bold; padding: 12px 30px;" onclick="app.saveTable()" data-i18n="launch">Launch Routine ✓</button>
            </div>
        </div>

        <div id="view-detail" class="view">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <div>
                    <button class="btn-primary" style="margin-bottom: 10px;" onclick="app.switchView('dashboard')" data-i18n="back">← Back</button>
                    <h2 id="detail-title">Plan Details</h2>
                </div>
                <button class="btn-primary" style="color:var(--danger-color); border-color:rgba(244,63,94,0.3); background: rgba(244,63,94,0.05);" onclick="app.deleteCurrentTable()" data-i18n="delete">🗑 Delete</button>
            </div>
            <div class="glass" id="detail-body" style="padding: 10px 0;"></div>
        </div>
    </main>

    <canvas id="sharing-canvas" style="display:none;"></canvas>

    <script>
        // --- Translations ---
        const translations = {
            en: {
                title: "Neural Planner Pro", home: "Home", newPlan: "+ New Plan", yourRoutines: "My Routines",
                designPlan: "Design New Plan", cancel: "Cancel", moduleTitle: "Title",
                titlePlaceholder: "Deep Work Protocol...", defineSeq: "Tasks Sequence",
                addNode: "+ New Task", taskPlaceholder: "Task description...",
                launch: "Launch✓", back: "←", delete: "Delete🗑",
                emptyAlert: "Add at least one task!", tasksLabel: "Tasks", doneLabel: "Completed",
                deletedNotice: "Plan deleted directly", saveName: "Save Name", enterName: "Mohammed Anas",
                downloadImage: "Neural Card 🌐", imgTitle: "Daily Cognitive Report",
                imgCompleted: "Completed Today:", imgLevel: "Focus Level: V6",
                phrases: ["System Optimized.", "Neural pathways connected.", "Focus level critical.", "Executing routine."]
            },
            ar: {
                title: "المخطط العصبي Pro", home: "الرئيسية", newPlan: "+ خطة", yourRoutines: "خططي الحالية",
                designPlan: "تصميم خطة", cancel: "إلغاء", moduleTitle: "عنوان الخطة",
                titlePlaceholder: "مثال: روتين العمل العميق...", defineSeq: "قائمة المهام",
                addNode: "+ مهمة جديدة", taskPlaceholder: "تفاصيل المهمة هنا...",
                launch: "حفظ الخطة ✓", back: "← رجوع", delete: "حذف🗑",
                emptyAlert: "يجب إضافة مهمة واحدة على الأقل قبل الحفظ!",
                tasksLabel: "مهام", doneLabel: "مكتملة",deletedNotice: "تم حذف الخطة مباشرة",
                saveName: "حفظ الاسم ✅", enterName: "محمد أنس",
                downloadImage: "البطاقة العصبية 🌐", imgTitle: "التقرير المعرفي اليومي",
                imgCompleted: "أنجز اليوم:", imgLevel: "مستوى التركيز: V6",
                phrases: ["تم تحسين النظام.", "تم ربط المسارات العصبية.", "مستوى التركيز حرج.", "جاري تنفيذ الروتين."]
            }
        };

        // --- Audio System ---
        const audio = { ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); },
            play(type) { this.init(); if (!this.ctx) return; const osc = this.ctx.createOscillator(), gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination); const t = this.ctx.currentTime; if (type === 'tap') { osc.frequency.setValueAtTime(600, t); osc.frequency.exponentialRampToValueAtTime(300, t+0.05); gain.gain.setValueAtTime(0.08, t); gain.gain.exponentialRampToValueAtTime(0.001, t+0.05); osc.start(t); osc.stop(t+0.05); } else if (type === 'success') { osc.frequency.setValueAtTime(400, t); osc.frequency.setValueAtTime(800, t+0.1); gain.gain.setValueAtTime(0.05, t); gain.gain.linearRampToValueAtTime(0, t+0.3); osc.start(t); osc.stop(t+0.3); } }
        };

        ['click', 'touchstart'].forEach(e => document.addEventListener(e, () => audio.init(), {once:true}));

        // --- Core App ---
        const app = {
            data: [], currentId: null, lang: 'en',
            logoPath: '1000201034.png', // التأكد من وجود هذا الملف في مستودعك

            init() {
                setTimeout(() => document.getElementById('intro-overlay')?.remove(), 2500);
                let savedLang = localStorage.getItem('appLang');
                if (savedLang !== 'en' && savedLang !== 'ar') savedLang = 'en'; this.lang = savedLang;
                this.applyLang();
                const stored = localStorage.getItem('plannerV6_ProDownload');
                if (stored) this.data = JSON.parse(stored);
                this.switchView('dashboard');
                // تحميل البيانات الجانبية (الاسم)
                this.loadProfile();
            },

            loadProfile() {
                const nameInput = document.getElementById('user-name');
                const savedName = localStorage.getItem('userName');
                if (savedName) nameInput.value = savedName;
            },

            saveProfile() {
                audio.play('tap');
                const nameInput = document.getElementById('user-name');
                const name = nameInput.value.trim();
                if (name) {
                    localStorage.setItem('userName', name);
                    this.triggerBrainGlow();
                    this.showToast('saveName', 'success');
                }
            },

            triggerBrainGlow() {
                const bg = document.getElementById('brain-bg'); const overlay = document.getElementById('brain-overlay');
                bg.classList.add('brain-pulse'); overlay.classList.add('overlay-pulse');
                setTimeout(() => { bg.classList.remove('brain-pulse'); overlay.classList.remove('overlay-pulse'); }, 800);
            },

            showToast(msgKey, type = 'success') {
                const msg = translations[this.lang][msgKey] || msgKey;
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div'); toast.className = `toast ${type}`; toast.innerHTML = `${type === 'success' ? '✅' : '⚠️'} ${msg}`;
                container.appendChild(toast); setTimeout(() => toast.remove(), 3000);
            },

            toggleLang() {
                audio.play('tap'); this.lang = this.lang === 'en' ? 'ar' : 'en'; localStorage.setItem('appLang', this.lang); this.applyLang();
                if(document.getElementById('view-dashboard').classList.contains('active')) this.renderDash(); else if(document.getElementById('view-create').classList.contains('active')) this.updatePlaceholders();
            },

            applyLang() {
                document.documentElement.dir = this.lang === 'ar' ? 'rtl' : 'ltr'; document.documentElement.lang = this.lang;
                document.getElementById('langBtnText').innerText = this.lang === 'en' ? 'AR' : 'EN';
                document.querySelectorAll('[data-i18n]').forEach(el => { const key = el.getAttribute('data-i18n'); if (translations[this.lang][key]) el.innerHTML = translations[this.lang][key]; });
                this.updatePlaceholders();
            },

            updatePlaceholders() { document.querySelectorAll('[data-i18n-ph]').forEach(el => { const key = el.getAttribute('data-i18n-ph'); if (translations[this.lang][key]) el.placeholder = translations[this.lang][key]; }); },

            switchView(view) {
                audio.play('tap'); document.querySelectorAll('.view').forEach(v => { v.classList.remove('active'); setTimeout(() => v.style.display='none', 300); }); const target = document.getElementById(`view-${view}`); setTimeout(() => { target.style.display='block'; void target.offsetWidth; target.classList.add('active'); }, 300);
                if (view === 'dashboard') this.renderDash(); else if (view === 'create') { document.getElementById('table-title').value = ''; document.getElementById('task-list').innerHTML = ''; this.addTaskRow(); }
            },

            renderDash() {
                const grid = document.getElementById('tables-grid'); grid.innerHTML = '';
                if (!this.data.length) { grid.innerHTML = `<div class="glass" style="grid-column:1/-1; padding:50px; text-align:center; color:var(--text-secondary); font-size:1.1rem;">${translations[this.lang].noRoutines}</div>`; return; }
                const tLang = translations[this.lang];
                this.data.forEach(item => { const done = item.tasks.filter(t => t.status === 'completed').length; const total = item.tasks.length; const card = document.createElement('div'); card.className = 'card glass'; card.onclick = () => { audio.play('tap'); this.open(item.id); }; card.innerHTML = `<div style="border-bottom:1px solid var(--surface-border); padding-bottom:12px;"><div style="font-size:1.2rem; font-weight:600; line-height: 1.5; word-wrap: break-word;">${this.esc(item.title)}</div></div><div style="display:flex; justify-content:space-between; color:var(--text-secondary); font-size:0.95rem; margin-top:15px; font-weight: 500;"><span>📋 ${total} ${tLang.tasksLabel}</span><span style="color:var(--success-color);">✓ ${done} ${tLang.doneLabel}</span></div>`; grid.appendChild(card); });
            },

            addTaskRow() { audio.play('tap'); const list = document.getElementById('task-list'); const row = document.createElement('div'); row.className = 'task-row'; const placeholder = translations[this.lang].taskPlaceholder; row.innerHTML = `<input type="text" class="t-name" placeholder="${placeholder}" required><input type="time" class="t-time" required><button class="btn-icon" onclick="audio.play('tap'); this.parentElement.remove()">✕</button>`; list.appendChild(row); },

            saveTable() {
                const title = document.getElementById('table-title').value.trim() || `Plan ${Math.floor(Math.random()*1000)}`; const rows = document.querySelectorAll('#task-list .task-row'); const tasks = [];
                rows.forEach(r => { const name = r.querySelector('.t-name').value.trim(); const time = r.querySelector('.t-time').value; if (name) tasks.push({ name, time: time || '--:--', status: 'pending', completedAt: null }); });
                if (tasks.length === 0) { this.showToast('emptyAlert', 'error'); return; }
                audio.play('success'); this.triggerBrainGlow(); this.data.unshift({ id: Date.now().toString(), title, tasks }); localStorage.setItem('plannerV6_ProDownload', JSON.stringify(this.data)); this.switchView('dashboard'); this.showToast(this.lang === 'ar' ? 'تم حفظ الخطة بنجاح!' : 'Plan saved successfully!', 'success');
            },

            open(id) {
                this.currentId = id; const item = this.data.find(i => i.id === id); if (!item) return;
                document.getElementById('detail-title').textContent = item.title; const body = document.getElementById('detail-body'); body.innerHTML = '';
                item.tasks.forEach((t, idx) => { const isDone = t.status === 'completed'; const row = document.createElement('div'); row.className = 'task-item'; row.innerHTML = `<div class="task-info"><span class="task-time">${this.esc(t.time)}</span><span class="task-name ${isDone ? 'done' : ''}">${this.esc(t.name)}</span></div><button class="toggle-btn ${isDone ? 'done' : ''}" onclick="app.toggle(${idx})"></button>`; body.appendChild(row); }); this.switchView('detail');
            },

            toggle(idx) {
                const item = this.data.find(i => i.id === this.currentId);
                if (item) {
                    const isDone = item.tasks[idx].status === 'pending';
                    item.tasks[idx].status = isDone ? 'completed' : 'pending';
                    item.tasks[idx].completedAt = isDone ? Date.now() : null; // تسجيل وقت الإنجاز
                    audio.play(isDone ? 'success' : 'tap');
                    if(isDone) this.triggerBrainGlow(); 
                    localStorage.setItem('plannerV6_ProDownload', JSON.stringify(this.data));
                    this.open(this.currentId);
                }
            },

            deleteCurrentTable() { audio.play('tap'); this.data = this.data.filter(i => i.id !== this.currentId); localStorage.setItem('plannerV6_ProDownload', JSON.stringify(this.data)); this.switchView('dashboard'); this.showToast('deletedNotice', 'error'); },

            esc(str) { return str ? str.replace(/[&<>'"]/g, tag => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[tag])) : ''; },

            // --- نظام تحميل الشعار وإخراج الصورة الاحترافي 4k ---
            downloadSummaryImage() {
                audio.play('tap');
                this.triggerBrainGlow();

                const userName = localStorage.getItem('userName') || (this.lang === 'ar' ? 'محمد أنس' : 'Mohammed Anas');
                const tLang = translations[this.lang];
                
                // حساب إنجازات اليوم (بتوقيت اليوم الحالي)
                const startOfToday = new Date().setHours(0,0,0,0);
                let doneTodayCount = 0;
                this.data.forEach(item => {
                    item.tasks.forEach(task => {
                        if (task.status === 'completed' && task.completedAt && task.completedAt >= startOfToday) {
                            doneTodayCount++;
                        }
                    });
                });

                // عبارة تحفيزية عشوائية
                const phrase = tLang.phrases[Math.floor(Math.random() * tLang.phrases.length)];
                
                const canvas = document.getElementById('sharing-canvas');
                const ctx = canvas.getContext('2d');
                
                // حجم كارد احترافي بدقة فائقة 4k للتحميل (1080x1350) مناسب للمشاركة
                canvas.width = 1080;
                canvas.height = 1350;

                const isRtl = this.lang === 'ar';
                ctx.textAlign = isRtl ? 'right' : 'left';
                
                // تحميل الشعار أولاً
                const logoImg = new Image();
                logoImg.onload = () => {
                    // 1. الخلفية الداكنة العميقة
                    ctx.fillStyle = '#030305';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // 2. تصميم زجاجي على الخلفية (تأثير ضبابي خفيف CSS خلفي لن نتمكن من محاكاته تماماً، لكن سنحاكي شفافية)
                    ctx.fillStyle = 'rgba(15, 15, 20, 0.9)';
                    const margin = 50;
                    roundRect(ctx, margin, margin, canvas.width - (margin*2), canvas.height - (margin*2), 30, true, true);

                    // 3. رسم الشعار في الأعلى (توسيط)
                    const logoWidth = 200;
                    const logoHeight = logoWidth;
                    ctx.drawImage(logoImg, (canvas.width / 2) - (logoWidth/2), 100, logoWidth, logoHeight);

                    // 4. النصوص الأساسية
                    ctx.fillStyle = '#f8fafc';
                    ctx.font = '600 50px ' + (isRtl ? 'Tajawal' : 'Outfit');
                    ctx.fillText(tLang.imgTitle, isRtl ? canvas.width - 150 : 150, 400);

                    // 5. الاسم
                    ctx.font = '700 80px ' + (isRtl ? 'Tajawal' : 'Outfit');
                    ctx.fillStyle = '#0ea5e9';
                    ctx.fillText(userName, isRtl ? canvas.width - 150 : 150, 520);

                    // 6. خط فاصل
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(150, 600);
                    ctx.lineTo(canvas.width - 150, 600);
                    ctx.stroke();

                    // 7. العداد اليومي والمستوى
                    ctx.fillStyle = '#94a3b8';
                    ctx.font = '400 45px ' + (isRtl ? 'Tajawal' : 'Outfit');
                    ctx.fillText(tLang.imgCompleted, isRtl ? canvas.width - 150 : 150, 700);
                    
                    ctx.fillStyle = '#10b981';
                    ctx.font = '700 90px ' + (isRtl ? 'Tajawal' : 'Outfit');
                    ctx.fillText(doneTodayCount + ' ' + tLang.tasksLabel, isRtl ? canvas.width - 150 : 150, 810);

                    ctx.fillStyle = '#94a3b8';
                    ctx.font = '400 45px ' + (isRtl ? 'Tajawal' : 'Outfit');
                    ctx.fillText(tLang.imgLevel, isRtl ? canvas.width - 150 : 150, 950);

                    // 8. العبارة التحفيزية (أسفل - توسيط)
                    ctx.textAlign = 'center';
                    ctx.fillStyle = '#f8fafc';
                    ctx.font = 'italic 500 48px ' + (isRtl ? 'Tajawal' : 'Outfit');
                    ctx.fillText('"' + phrase + '"', canvas.width / 2, 1150);

                    // 9. حقوق فخمة
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.font = '300 30px Outfit';
                    ctx.fillText('NeuralPlanner V6 -Mohammed Anas- Neural Core', canvas.width / 2, 1280);

                    // التحميل المباشر
                    const link = document.createElement('a');
                    link.download = `NeuralPlanner_${userName}_${new Date().toLocaleDateString()}.png`;
                    link.href = canvas.toDataURL('image/png', 1.0);
                    link.click();
                    link.remove();
                };

                // محاولة تحميل الشعار من الملف الموجود
                logoImg.onerror = () => {
                    this.showToast('عفواً، لم أجد ملف الشعار المرفق (1000201034.png). تأكد من رفعه في نفس المستودع.', 'error');
                };
                logoImg.src = this.logoPath;
            }
        };

        // دالة مساعدة رسم كارد بحواف مستديرة
        function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
            if (typeof radius === 'number') { radius = {tl: radius, tr: radius, bl: radius, br: radius}; } else { var defaultRadius = {tl: 0, tr: 0, bl: 0, br: 0}; for (var side in defaultRadius) { radius[side] = radius[side] || defaultRadius[side]; } }
            ctx.beginPath(); ctx.moveTo(x + radius.tl, y); ctx.lineTo(x + width - radius.tr, y); ctx.quadraticCurveTo(x + width, y, x + width, y + radius.tr); ctx.lineTo(x + width, y + height - radius.br); ctx.quadraticCurveTo(x + width, y + height, x + width - radius.br, y + height); ctx.lineTo(x + radius.bl, y + height); ctx.quadraticCurveTo(x, y + height, x, y + height - radius.bl); ctx.lineTo(x, y + radius.tl); ctx.quadraticCurveTo(x, y, x + radius.tl, y); ctx.closePath();
            if (fill) { ctx.fill(); } if (stroke) { ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.stroke(); }
        }

        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
