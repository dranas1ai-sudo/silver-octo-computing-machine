<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Planner - V5 Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030305;
            --surface-color: rgba(20, 20, 30, 0.5);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary-color: #0ea5e9; 
            --success-color: #10b981;
            --danger-color: #f43f5e;
            --transition: all 0.4s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html[dir="rtl"] { font-family: 'Tajawal', sans-serif; }
        html[dir="ltr"] { font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-primary); overflow-x: hidden; min-height: 100vh; }

        /* --- Background & Effects --- */
        #brain-bg { position: fixed; inset: 0; z-index: -2; background: url('brain.gif') center/cover no-repeat; transition: var(--transition); }
        #brain-overlay { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 0%, rgba(5,5,8,0.6) 0%, rgba(0,0,0,0.85) 100%); backdrop-filter: blur(2px); }
        .brain-pulse { transform: scale(1.05); filter: brightness(1.5) contrast(1.2); }

        /* --- العيون (Intro) --- */
        #intro-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; animation: fadeOut 1s forwards 2s; }
        .eyes-container { display: flex; gap: 40px; }
        .eye { width: 45px; height: 12px; background: var(--primary-color); border-radius: 50%; box-shadow: 0 0 20px var(--primary-color); animation: blink 4s infinite; }
        @keyframes blink { 0%, 96%, 100% { transform: scaleY(1); } 98% { transform: scaleY(0.1); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* --- Navigation --- */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(3,3,5,0.7); backdrop-filter: blur(15px); border-bottom: 1px solid var(--surface-border); position: sticky; top: 0; z-index: 100; }
        .brand h1 { font-size: 1.3rem; color: var(--primary-color); }
        .nav-actions { display: flex; gap: 10px; }

        /* --- Buttons --- */
        button { cursor: pointer; border: none; border-radius: 10px; transition: var(--transition); font-family: inherit; }
        .btn-primary { background: rgba(255,255,255,0.05); border: 1px solid var(--surface-border); color: #fff; padding: 10px 18px; font-size: 0.9rem; }
        .btn-primary:hover { border-color: var(--primary-color); background: rgba(14,165,233,0.1); }
        .btn-lang { background: rgba(255,255,255,0.02); padding: 8px 15px; border-radius: 20px; color: #fff; font-weight: bold; border: 1px solid var(--surface-border); }

        /* --- Main Content --- */
        main { padding: 30px 5%; max-width: 900px; margin: 0 auto; }
        .view { display: none; }
        .view.active { display: block; animation: fadeInView 0.5s ease; }
        @keyframes fadeInView { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass { background: var(--surface-color); backdrop-filter: blur(20px); border: 1px solid var(--surface-border); border-radius: 20px; padding: 25px; margin-bottom: 25px; }
        
        .profile-box { display: flex; gap: 10px; margin-top: 15px; }
        .profile-box input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--surface-border); padding: 12px; border-radius: 10px; color: #fff; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { padding: 20px; cursor: pointer; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .toggle-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--surface-border); display: flex; align-items: center; justify-content: center; background: none; }
        .toggle-btn.done { background: var(--success-color); border-color: var(--success-color); color: #000; }
        .toggle-btn.done::after { content: '✓'; font-weight: bold; }

        .toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; }
        .toast { background: rgba(0,0,0,0.9); padding: 12px 25px; border-radius: 30px; border: 1px solid var(--primary-color); margin-top: 10px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="brain-bg"></div>
    <div id="brain-overlay"></div>

    <div id="intro-overlay">
        <div class="eyes-container"><div class="eye"></div><div class="eye"></div></div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <nav>
        <div class="brand">
            <h1 data-i18n="title">Neural Planner</h1>
            <span style="font-size: 0.7rem; color: var(--text-secondary);">V5 PRO • Mohammed Anas</span>
        </div>
        <div class="nav-actions">
            <button class="btn-lang" onclick="app.toggleLang()" id="langBtn">AR</button>
            <button class="btn-primary" onclick="app.switchView('dashboard')" data-i18n="home">Home</button>
        </div>
    </nav>

    <main>
        <div id="view-dashboard" class="view active">
            <div class="glass">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2 data-i18n="status">System Status</h2>
                    <button class="btn-primary" onclick="app.downloadImage()" style="background: var(--primary-color); color: #000; font-weight: bold; border: none;">📸 <span data-i18n="card">Card</span></button>
                </div>
                <div class="profile-box">
                    <input type="text" id="user-name" data-i18n-ph="namePh" placeholder="Enter name for card...">
                    <button class="btn-primary" onclick="app.saveName()" data-i18n="save">Save</button>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <h3 data-i18n="routines">Routines</h3>
                <button class="btn-primary" onclick="app.switchView('create')" data-i18n="new">+ New</button>
            </div>
            <div id="grid" class="grid"></div>
        </div>

        <div id="view-create" class="view glass">
            <h2 data-i18n="new">New Plan</h2>
            <input type="text" id="title-input" placeholder="Title..." style="width: 100%; margin: 20px 0; background: rgba(0,0,0,0.3); border: 1px solid var(--surface-border); padding: 12px; border-radius: 10px; color: #fff;">
            <div id="task-inputs"></div>
            <button class="btn-primary" onclick="app.addTaskRow()" style="width: 100%; margin-top: 10px;">+ Add Task</button>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-primary" onclick="app.savePlan()" style="flex: 1; background: var(--success-color); color: #000; border: none;">Save</button>
                <button class="btn-primary" onclick="app.switchView('dashboard')" style="flex: 1;">Cancel</button>
            </div>
        </div>

        <div id="view-detail" class="view">
            <div class="glass">
                <button class="btn-primary" onclick="app.switchView('dashboard')" style="margin-bottom: 15px;">← Back</button>
                <h2 id="detail-title"></h2>
                <div id="detail-list" style="margin-top: 20px;"></div>
                <button class="btn-primary" onclick="app.deletePlan()" style="width: 100%; margin-top: 25px; color: var(--danger-color); border-color: rgba(244,63,94,0.2);">Delete Plan</button>
            </div>
        </div>
    </main>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const translations = {
            en: { title: "Neural Planner", home: "Home", status: "System Status", card: "Neural Card", namePh: "Your Name...", save: "Save Name", routines: "Routines", new: "+ New Plan", tasks: "Tasks", done: "Done", note: "This report requires the direct review of Mohammed Anas for adoption.", footer: "Neural Core V5 Pro" },
            ar: { title: "المخطط العصبي", home: "الرئيسية", status: "حالة النظام", card: "البطاقة", namePh: "اكتب اسمك هنا...", save: "حفظ الاسم", routines: "الخطط اليومية", new: "+ خطة جديدة", tasks: "مهام", done: "مكتملة", note: "يرجى إرسال هذه البطاقة لمحمد أنس لتوقيعها واعتمادها.", footer: "النواة العصبية V5" }
        };

        const app = {
            data: JSON.parse(localStorage.getItem('np5')) || [],
            lang: localStorage.getItem('lang') || 'en',
            currentId: null,

            init() {
                this.applyLang();
                this.render();
                document.getElementById('user-name').value = localStorage.getItem('uname') || '';
            },

            applyLang() {
                document.documentElement.dir = this.lang === 'ar' ? 'rtl' : 'ltr';
                document.getElementById('langBtn').innerText = this.lang === 'en' ? 'AR' : 'EN';
                document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = translations[this.lang][el.getAttribute('data-i18n')]);
                document.querySelectorAll('[data-i18n-ph]').forEach(el => el.placeholder = translations[this.lang][el.getAttribute('data-i18n-ph')]);
            },

            toggleLang() { this.lang = this.lang === 'en' ? 'ar' : 'en'; localStorage.setItem('lang', this.lang); this.init(); },

            switchView(v) { document.querySelectorAll('.view').forEach(el => el.classList.remove('active')); document.getElementById('view-'+v).classList.add('active'); if(v==='create') { document.getElementById('task-inputs').innerHTML = ''; this.addTaskRow(); } },

            addTaskRow() {
                const div = document.createElement('div'); div.style.display = 'flex'; div.style.gap = '10px'; div.style.marginBottom = '10px';
                div.innerHTML = `<input type="text" class="t-n" placeholder="Task..." style="flex:2; background:rgba(0,0,0,0.3); border:1px solid var(--surface-border); padding:10px; border-radius:8px; color:#fff;">
                                 <input type="time" class="t-t" style="flex:1; background:rgba(0,0,0,0.3); border:1px solid var(--surface-border); padding:10px; border-radius:8px; color:#fff;">`;
                document.getElementById('task-inputs').appendChild(div);
            },

            savePlan() {
                const title = document.getElementById('title-input').value;
                const tasks = [];
                document.querySelectorAll('#task-inputs div').forEach(row => {
                    const name = row.querySelector('.t-n').value;
                    if(name) tasks.push({ name, time: row.querySelector('.t-t').value || '--:--', done: false });
                });
                if(!title || tasks.length === 0) return;
                this.data.unshift({ id: Date.now(), title, tasks });
                this.save(); this.switchView('dashboard'); this.render();
            },

            save() { localStorage.setItem('np5', JSON.stringify(this.data)); },

            render() {
                const container = document.getElementById('grid'); container.innerHTML = '';
                this.data.forEach(p => {
                    const done = p.tasks.filter(t => t.done).length;
                    const div = document.createElement('div'); div.className = 'glass card';
                    div.onclick = () => this.openPlan(p.id);
                    div.innerHTML = `<h4>${p.title}</h4><p style="font-size:0.8rem; color:var(--text-secondary); margin-top:10px;">${done}/${p.tasks.length} ${translations[this.lang].done}</p>`;
                    container.appendChild(div);
                });
            },

            openPlan(id) {
                this.currentId = id; const p = this.data.find(x => x.id === id);
                document.getElementById('detail-title').innerText = p.title;
                const list = document.getElementById('detail-list'); list.innerHTML = '';
                p.tasks.forEach((t, i) => {
                    const item = document.createElement('div'); item.className = 'task-item';
                    item.innerHTML = `<div><span style="color:var(--primary-color); font-weight:bold; margin-right:10px;">${t.time}</span> ${t.name}</div>
                                      <button class="toggle-btn ${t.done?'done':''}" onclick="app.toggleTask(${i})"></button>`;
                    list.appendChild(item);
                });
                this.switchView('detail');
            },

            toggleTask(i) {
                const p = this.data.find(x => x.id === this.currentId);
                p.tasks[i].done = !p.tasks[i].done;
                if(p.tasks[i].done) {
                    document.getElementById('brain-bg').classList.add('brain-pulse');
                    setTimeout(() => document.getElementById('brain-bg').classList.remove('brain-pulse'), 500);
                }
                this.save(); this.openPlan(this.currentId);
            },

            deletePlan() { this.data = this.data.filter(x => x.id !== this.currentId); this.save(); this.switchView('dashboard'); this.render(); },

            saveName() { localStorage.setItem('uname', document.getElementById('user-name').value); this.toast("Name Saved"); },
            toast(m) { const t = document.createElement('div'); t.className='toast'; t.innerText=m; document.getElementById('toast-container').appendChild(t); setTimeout(()=>t.remove(), 2000); },

            // --- إصلاح الشعار المطعوج والبطاقة الفخمة ---
            downloadImage() {
                const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d');
                canvas.width = 1000; canvas.height = 1300;
                const uname = localStorage.getItem('uname') || "Mohammed Anas";
                const doneCount = this.data.reduce((acc, p) => acc + p.tasks.filter(t => t.done).length, 0);

                const logo = new Image();
                logo.src = '1000201034.png';
                logo.onload = () => {
                    ctx.fillStyle = '#030305'; ctx.fillRect(0,0,1000,1300);
                    ctx.fillStyle = '#0a0a0f'; ctx.roundRect(50,50,900,1200,40); ctx.fill();
                    
                    // رسم الشعار باحترافية (بدون طعج)
                    const s = 250; // حجم المربع المخصص للشعار
                    const x = 500 - s/2; const y = 120;
                    ctx.save();
                    ctx.beginPath(); ctx.arc(500, y + s/2, s/2, 0, Math.PI*2); ctx.clip();
                    
                    // هذه المعادلة تضمن عدم الطعج (Object-fit: contain)
                    const ratio = logo.width / logo.height;
                    let w = s, h = s;
                    if (ratio > 1) h = s / ratio; else w = s * ratio;
                    ctx.drawImage(logo, 500 - w/2, y + (s - h)/2, w, h);
                    ctx.restore();

                    ctx.fillStyle = '#0ea5e9'; ctx.font = 'bold 70px Outfit'; ctx.textAlign = 'center'; ctx.fillText(uname, 500, 480);
                    ctx.fillStyle = '#fff'; ctx.font = '40px Outfit'; ctx.fillText(translations[this.lang].imgTitle || "Cognitive Report", 500, 560);
                    
                    ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(150, 620); ctx.lineTo(850, 620); ctx.stroke();

                    ctx.fillStyle = '#10b981'; ctx.font = 'bold 120px Outfit'; ctx.fillText(doneTodayCount || doneCount, 500, 800);
                    ctx.fillStyle = '#94a3b8'; ctx.font = '40px Outfit'; ctx.fillText(translations[this.lang].tasks || "Tasks Completed", 500, 880);

                    // الملاحظة بالخط الإنجليزي الفخم (Signature Style)
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.font = 'italic 32px Georgia, serif';
                    const note = translations[this.lang].note;
                    if(this.lang === 'ar') {
                        ctx.font = '400 30px Tajawal'; ctx.fillText(note, 500, 1050);
                    } else {
                        ctx.fillText("This report requires the direct review", 500, 1030);
                        ctx.fillText("and adoption of Mohammed Anas.", 500, 1080);
                    }

                    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.font = '25px Outfit'; ctx.fillText("Neural Core V5 • 2026", 500, 1200);

                    const link = document.createElement('a'); link.download = 'NeuralCard.png'; link.href = canvas.toDataURL(); link.click();
                };
            }
        };
        app.init();
    </script>
</body>
</html>
