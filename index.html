<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Planner - Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --bg-color: #030305;
            --surface-color: rgba(15, 15, 20, 0.45); /* شفافية احترافية */
            --surface-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-glow: 0 0 20px rgba(56, 189, 248, 0.15);
            --primary-color: #38bdf8; /* لون أزرق سماوي احترافي */
            --danger-color: #f43f5e;
            --success-color: #10b981;
            --font-family: 'Poppins', sans-serif;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        body {
            background-color: var(--bg-color);
            /* ربط صورة المخ */
            background-image: url('./brain.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* طبقة تعتيم احترافية متدرجة */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(3,3,5,0.6) 100%);
            z-index: -1;
        }

        /* --- Intro Animation --- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background-color: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeOutIntro 1s forwards;
            animation-delay: 2s;
        }

        .eyes-container {
            display: flex;
            gap: 30px;
        }

        .eye {
            width: 40px;
            height: 10px;
            background-color: var(--primary-color);
            border-radius: 50%;
            box-shadow: 0 0 25px var(--primary-color);
            animation: pulseEye 2s infinite, blinkEye 4s infinite;
        }

        @keyframes pulseEye {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 40px var(--primary-color); }
        }

        @keyframes blinkEye {
            0%, 96%, 98%, 100% { transform: scaleY(1); }
            97%, 99% { transform: scaleY(0.1); }
        }

        @keyframes fadeOutIntro {
            to { opacity: 0; visibility: hidden; backdrop-filter: blur(0px); }
        }

        /* --- Glassmorphism UI --- */
        .glass {
            background: var(--surface-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(3, 3, 5, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .brand h1 {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(to right, #fff, var(--primary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand span {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        button {
            cursor: pointer;
            border: none;
            outline: none;
            font-family: inherit;
            transition: var(--transition);
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
            transform: translateY(-2px);
        }

        main {
            padding: 40px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .view {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: var(--transition);
        }

        .view.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Cards Grid --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .card {
            padding: 24px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(255,255,255,0.2);
            background: rgba(30, 30, 40, 0.6);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--surface-border);
            padding-bottom: 12px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .progress-bar-bg {
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--success-color);
            border-radius: 10px;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--success-color);
        }

        /* --- Forms --- */
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--surface-border);
            color: white;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .task-row {
            display: flex;
            gap: 12px;
            padding: 12px;
        }

        .task-row input[type="text"] { flex: 2; }
        .task-row input[type="time"] { flex: 1; }

        .btn-icon {
            width: 45px;
            border-radius: 12px;
            background: rgba(244, 63, 94, 0.1);
            color: var(--danger-color);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid transparent;
        }

        .btn-icon:hover {
            background: var(--danger-color);
            color: white;
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.4);
        }

        /* --- Table View --- */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px 24px;
            text-align: left;
            border-bottom: 1px solid var(--surface-border);
        }

        th {
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        tr { transition: background 0.3s; }
        tr:hover { background: rgba(255, 255, 255, 0.02); }

        .status-badge {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .status-pending {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .status-completed {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border: 1px solid rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.15);
        }

        .status-badge:hover {
            transform: scale(1.05);
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media (max-width: 768px) {
            .task-row { flex-direction: column; }
            .task-row .btn-icon { width: 100%; padding: 12px; }
            th, td { padding: 12px; }
            .brand h1 { font-size: 1.2rem; }
            nav { padding: 15px 5%; }
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="eyes-container">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
    </div>

    <nav>
        <div class="brand">
            <h1>Daily Planner</h1>
            <span>PRO EDITION • Mohammed Anas</span>
        </div>
        <div class="nav-links">
            <button class="btn-primary" onclick="app.switchView('dashboard')">Home</button>
            <button class="btn-primary" onclick="app.switchView('create')">+ New</button>
        </div>
    </nav>

    <main>
        <div id="view-dashboard" class="view active">
            <div class="flex-between" style="margin-bottom: 30px;">
                <h2 style="font-weight: 500;">Your Schedules</h2>
            </div>
            <div id="tables-grid" class="grid"></div>
        </div>

        <div id="view-create" class="view glass" style="padding: 35px;">
            <h2 style="margin-bottom: 25px; font-weight: 500;">Create Table</h2>
            <div class="form-group">
                <label>Table Title</label>
                <input type="text" id="table-title" placeholder="e.g., University Schedule..." autocomplete="off">
            </div>

            <div class="form-group" style="margin-top: 30px;">
                <label>Tasks List</label>
                <div id="task-list" class="task-list"></div>
                <button class="btn-primary" style="width: 100%; border-style: dashed;" onclick="app.addTaskRow()">+ Add New Task</button>
            </div>

            <div style="margin-top: 40px; text-align: right;">
                <button class="btn-primary" style="background: var(--primary-color); color: #000; font-weight: 600; border:none;" onclick="app.saveTable()">✓ Save Schedule</button>
            </div>
        </div>

        <div id="view-detail" class="view">
            <div class="detail-header flex-between" style="margin-bottom: 20px;">
                <div>
                    <button class="btn-primary" style="margin-bottom: 15px;" onclick="app.switchView('dashboard')">← Back</button>
                    <h2 id="detail-title" style="font-weight: 500;">Title</h2>
                </div>
                <button class="btn-icon" title="Delete" onclick="app.deleteCurrentTable()">🗑</button>
            </div>
            
            <div class="glass" style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Task</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="detail-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // --- نظام الصوت الاحترافي المخصص للهواتف ---
        const audioSystem = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AudioContext();
                }
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            play(type) {
                this.init();
                if (!this.ctx) return;
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                if (type === 'click') {
                    // صوت نقرة ناعم وعصري
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(200, this.ctx.currentTime + 0.05);
                    gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.05);
                } else if (type === 'success') {
                    // صوت إنجاز مريح
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(500, this.ctx.currentTime);
                    osc.frequency.setValueAtTime(800, this.ctx.currentTime + 0.1);
                    osc.frequency.setValueAtTime(1200, this.ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.1, this.ctx.currentTime + 0.05);
                    gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.3);
                }
            }
        };

        // فتح نظام الصوت عند أول لمسة للشاشة (مطلوب للهواتف)
        document.body.addEventListener('pointerdown', () => audioSystem.init(), { once: true });
        document.body.addEventListener('touchstart', () => audioSystem.init(), { once: true });

        // --- التطبيق ---
        const app = {
            data: [],
            currentTableId: null,

            init() {
                setTimeout(() => {
                    const intro = document.getElementById('intro-overlay');
                    if (intro) intro.remove();
                }, 3000);
                this.loadData();
                this.renderDashboard();
                this.addTaskRow();
            },

            loadData() {
                const stored = localStorage.getItem('proPlannerData');
                if (stored) this.data = JSON.parse(stored);
            },

            saveData() {
                localStorage.setItem('proPlannerData', JSON.stringify(this.data));
            },

            switchView(viewName) {
                audioSystem.play('click');
                document.querySelectorAll('.view').forEach(v => {
                    v.classList.remove('active');
                    setTimeout(() => v.style.display = 'none', 300);
                });
                
                const target = document.getElementById(`view-${viewName}`);
                setTimeout(() => {
                    target.style.display = 'block';
                    setTimeout(() => target.classList.add('active'), 10);
                }, 300);
                
                if (viewName === 'dashboard') this.renderDashboard();
                else if (viewName === 'create') {
                    document.getElementById('table-title').value = '';
                    document.getElementById('task-list').innerHTML = '';
                    this.addTaskRow();
                }
            },

            renderDashboard() {
                const grid = document.getElementById('tables-grid');
                grid.innerHTML = '';

                if (this.data.length === 0) {
                    grid.innerHTML = `<div class="glass" style="grid-column: 1/-1; padding: 40px; text-align: center; color: var(--text-secondary);">No schedules yet. Start planning!</div>`;
                    return;
                }

                this.data.forEach(table => {
                    const completed = table.tasks.filter(t => t.status === 'completed').length;
                    const total = table.tasks.length;
                    const percent = total ? (completed / total) * 100 : 0;
                    
                    const card = document.createElement('div');
                    card.className = 'card glass';
                    card.onclick = () => { audioSystem.play('click'); this.openTable(table.id); };
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="card-title">${this.escapeHTML(table.title)}</div>
                        </div>
                        <div style="color: var(--text-secondary); font-size: 0.9rem;">
                            ${completed} of ${total} tasks completed
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width: ${percent}%"></div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            },

            addTaskRow() {
                audioSystem.play('click');
                const container = document.getElementById('task-list');
                const row = document.createElement('div');
                row.className = 'task-row glass';
                row.innerHTML = `
                    <input type="text" class="t-name" placeholder="Task name..." required>
                    <input type="time" class="t-time" required>
                    <button class="btn-icon" onclick="audioSystem.play('click'); this.parentElement.remove()">✕</button>
                `;
                container.appendChild(row);
            },

            saveTable() {
                const titleInput = document.getElementById('table-title').value.trim();
                const title = titleInput || `Plan ${new Date().toLocaleDateString()}`;
                const rows = document.querySelectorAll('#task-list .task-row');
                const tasks = [];

                rows.forEach(row => {
                    const name = row.querySelector('.t-name').value.trim();
                    const time = row.querySelector('.t-time').value;
                    if (name) tasks.push({ name, time: time || '--:--', status: 'pending' });
                });

                if (tasks.length === 0) return alert("Add at least one task!");

                audioSystem.play('success');
                this.data.push({ id: Date.now().toString(), title, tasks });
                this.saveData();
                this.switchView('dashboard');
            },

            openTable(id) {
                this.currentTableId = id;
                const table = this.data.find(t => t.id === id);
                if (!table) return;

                document.getElementById('detail-title').textContent = table.title;
                const tbody = document.getElementById('detail-body');
                tbody.innerHTML = '';

                table.tasks.forEach((task, index) => {
                    const isCompleted = task.status === 'completed';
                    const badgeClass = isCompleted ? 'status-completed' : 'status-pending';
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="color: var(--primary-color); width: 100px;">${this.escapeHTML(task.time)}</td>
                        <td style="${isCompleted ? 'text-decoration: line-through; opacity: 0.4;' : ''}">${this.escapeHTML(task.name)}</td>
                        <td style="width: 140px;">
                            <span class="status-badge ${badgeClass}" onclick="app.toggleTaskStatus(${index})">
                                ${isCompleted ? '✓ Done' : 'Pending'}
                            </span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
                this.switchView('detail');
            },

            toggleTaskStatus(index) {
                const table = this.data.find(t => t.id === this.currentTableId);
                if (table) {
                    const isDone = table.tasks[index].status === 'pending';
                    table.tasks[index].status = isDone ? 'completed' : 'pending';
                    audioSystem.play(isDone ? 'success' : 'click');
                    this.saveData();
                    this.openTable(this.currentTableId);
                }
            },

            deleteCurrentTable() {
                if(confirm("Delete this schedule?")) {
                    audioSystem.play('click');
                    this.data = this.data.filter(t => t.id !== this.currentTableId);
                    this.saveData();
                    this.switchView('dashboard');
                }
            },

            escapeHTML(str) {
                return str.replace(/[&<>'"]/g, tag => ({'&': '&amp;','<': '&lt;','>': '&gt;',"'": '&#39;','"': '&quot;'}[tag]));
            }
        };

        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
