<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Planner</title>
    <style>
        :root {
            color-scheme: dark;
            --bg-color: #050505;
            --surface-color: rgba(25, 25, 25, 0.6);
            --surface-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-glow: 0 0 15px rgba(255, 255, 255, 0.2);
            --accent-glow-strong: 0 0 25px rgba(100, 150, 255, 0.5);
            --primary-color: #e0e0e0;
            --danger-color: #ff5555;
            --success-color: #55ff99;
            --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1a1a24 0%, #050505 60%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Intro Animation --- */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeOutIntro 1s forwards;
            animation-delay: 2.5s;
        }

        .eyes-container {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .eye {
            width: 45px;
            height: 12px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px 5px rgba(255, 255, 255, 0.8);
            animation: pulseEye 2s infinite, blinkEye 4s infinite;
        }

        @keyframes pulseEye {
            0%, 100% { box-shadow: 0 0 15px 2px rgba(255, 255, 255, 0.6); transform: scale(1); }
            50% { box-shadow: 0 0 30px 8px rgba(255, 255, 255, 1); transform: scale(1.05); }
        }

        @keyframes blinkEye {
            0%, 96%, 98%, 100% { transform: scaleY(1); }
            97%, 99% { transform: scaleY(0.1); }
        }

        @keyframes fadeOutIntro {
            to { opacity: 0; visibility: hidden; }
        }

        /* --- Layout & Glassmorphism --- */
        .glass {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--surface-border);
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: var(--accent-glow);
        }

        .brand span {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: block;
            margin-top: 2px;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        button {
            cursor: pointer;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 1rem;
            transition: var(--transition);
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--surface-border);
            padding: 10px 20px;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
        }

        .btn-primary:hover::before {
            width: 200px;
            height: 200px;
        }

        .btn-primary:hover {
            box-shadow: var(--accent-glow-strong);
            border-color: rgba(255, 255, 255, 0.3);
        }

        main {
            padding: 40px 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .view {
            display: none;
            animation: fadeInView 0.5s ease forwards;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeInView {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Dashboard Grid --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            padding: 25px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), var(--accent-glow);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--surface-border);
            padding-bottom: 10px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .card-stats {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* --- Forms & Inputs --- */
        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        input[type="text"], input[type="time"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--surface-border);
            color: var(--text-primary);
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
        }

        input[type="text"]:focus, input[type="time"]:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: var(--accent-glow);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .task-row {
            display: flex;
            gap: 15px;
            padding: 15px;
            align-items: center;
            animation: fadeInView 0.3s ease forwards;
        }

        .task-row input[type="text"] { flex: 2; }
        .task-row input[type="time"] { flex: 1; }

        .btn-icon {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--surface-border);
        }

        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .text-danger { color: var(--danger-color); }
        .text-danger:hover { background: rgba(255, 85, 85, 0.2); border-color: var(--danger-color); }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- Detail View --- */
        .detail-header {
            margin-bottom: 30px;
        }
        
        .detail-header h2 {
            font-size: 2rem;
            text-shadow: var(--accent-glow);
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid var(--surface-border);
        }

        th {
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            user-select: none;
            transition: var(--transition);
            border: 1px solid transparent;
            display: inline-block;
        }

        .status-pending {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            border-color: var(--surface-border);
        }

        .status-completed {
            background: rgba(85, 255, 153, 0.1);
            color: var(--success-color);
            border-color: rgba(85, 255, 153, 0.3);
            box-shadow: 0 0 10px rgba(85, 255, 153, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .task-row { flex-direction: column; }
            .task-row input { width: 100%; }
            .task-row .btn-icon { width: 100%; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="eyes-container">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
    </div>

    <nav>
        <div class="brand">
            <h1>Daily Planner</h1>
            <span>Created by Mohammed Anas</span>
        </div>
        <div class="nav-links">
            <button class="btn-primary" onclick="app.switchView('dashboard')">View All</button>
            <button class="btn-primary" onclick="app.switchView('create')">+ New Table</button>
        </div>
    </nav>

    <main>
        <div id="view-dashboard" class="view active">
            <div class="flex-between" style="margin-bottom: 30px;">
                <h2>Your Schedules</h2>
            </div>
            <div id="tables-grid" class="grid">
                </div>
        </div>

        <div id="view-create" class="view glass" style="padding: 30px;">
            <h2 style="margin-bottom: 25px;">Create New Table</h2>
            <div class="form-group">
                <label>Table Title (e.g., "Monday Schedule")</label>
                <input type="text" id="table-title" placeholder="Enter title..." autocomplete="off">
            </div>

            <div class="form-group">
                <label>Tasks</label>
                <div id="task-list" class="task-list">
                    </div>
                <button class="btn-primary" onclick="app.addTaskRow()">+ Add Task</button>
            </div>

            <div style="margin-top: 40px; text-align: right; border-top: 1px solid var(--surface-border); padding-top: 20px;">
                <button class="btn-primary" style="background: rgba(255,255,255,0.2);" onclick="app.saveTable()">Save Table</button>
            </div>
        </div>

        <div id="view-detail" class="view">
            <div class="detail-header flex-between">
                <div>
                    <button class="btn-primary" style="margin-bottom: 15px; padding: 5px 15px;" onclick="app.switchView('dashboard')">← Back</button>
                    <h2 id="detail-title">Table Title</h2>
                </div>
                <button class="btn-icon text-danger" title="Delete Table" onclick="app.deleteCurrentTable()">🗑</button>
            </div>
            
            <div class="glass table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Task Name</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="detail-body">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const app = {
            data: [],
            currentTableId: null,

            init() {
                // Intro removal
                setTimeout(() => {
                    const intro = document.getElementById('intro-overlay');
                    if (intro) intro.remove();
                }, 3500);

                this.loadData();
                this.renderDashboard();
                this.addTaskRow(); // Init with one empty row
            },

            loadData() {
                const stored = localStorage.getItem('dailyPlannerData');
                if (stored) {
                    this.data = JSON.parse(stored);
                }
            },

            saveData() {
                localStorage.setItem('dailyPlannerData', JSON.stringify(this.data));
            },

            switchView(viewName) {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.getElementById(`view-${viewName}`).classList.add('active');
                
                if (viewName === 'dashboard') {
                    this.renderDashboard();
                } else if (viewName === 'create') {
                    document.getElementById('table-title').value = '';
                    document.getElementById('task-list').innerHTML = '';
                    this.addTaskRow();
                }
            },

            renderDashboard() {
                const grid = document.getElementById('tables-grid');
                grid.innerHTML = '';

                if (this.data.length === 0) {
                    grid.innerHTML = `<div class="empty-state glass" style="grid-column: 1 / -1;">No tables found. Create one to get started!</div>`;
                    return;
                }

                this.data.forEach(table => {
                    const completed = table.tasks.filter(t => t.status === 'completed').length;
                    const total = table.tasks.length;
                    
                    const card = document.createElement('div');
                    card.className = 'card glass';
                    card.onclick = () => this.openTable(table.id);
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="card-title">${this.escapeHTML(table.title)}</div>
                        </div>
                        <div class="card-stats">
                            Tasks: ${total} <br>
                            Completed: ${completed}/${total}
                        </div>
                        <div style="margin-top: 10px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;">
                            <div style="height: 100%; width: ${total ? (completed/total)*100 : 0}%; background: var(--success-color); box-shadow: var(--accent-glow);"></div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            },

            addTaskRow() {
                const container = document.getElementById('task-list');
                const row = document.createElement('div');
                row.className = 'task-row glass';
                row.innerHTML = `
                    <input type="text" class="t-name" placeholder="Task description..." required>
                    <input type="time" class="t-time" required>
                    <button class="btn-icon text-danger" onclick="this.parentElement.remove()" title="Remove Task">✕</button>
                `;
                container.appendChild(row);
            },

            saveTable() {
                const titleInput = document.getElementById('table-title').value.trim();
                const title = titleInput || `Schedule ${new Date().toLocaleDateString()}`;
                
                const rows = document.querySelectorAll('#task-list .task-row');
                const tasks = [];

                rows.forEach(row => {
                    const name = row.querySelector('.t-name').value.trim();
                    const time = row.querySelector('.t-time').value;
                    if (name) {
                        tasks.push({ name, time: time || '--:--', status: 'pending' });
                    }
                });

                if (tasks.length === 0) {
                    alert("Please add at least one task.");
                    return;
                }

                const newTable = {
                    id: Date.now().toString(),
                    title,
                    tasks
                };

                this.data.push(newTable);
                this.saveData();
                this.switchView('dashboard');
            },

            openTable(id) {
                this.currentTableId = id;
                const table = this.data.find(t => t.id === id);
                if (!table) return;

                document.getElementById('detail-title').textContent = table.title;
                const tbody = document.getElementById('detail-body');
                tbody.innerHTML = '';

                table.tasks.forEach((task, index) => {
                    const tr = document.createElement('tr');
                    
                    const isCompleted = task.status === 'completed';
                    const badgeClass = isCompleted ? 'status-completed' : 'status-pending';
                    const badgeText = isCompleted ? 'Completed' : 'Pending';

                    tr.innerHTML = `
                        <td style="color: var(--text-secondary); width: 120px;">${this.escapeHTML(task.time)}</td>
                        <td style="${isCompleted ? 'text-decoration: line-through; opacity: 0.5;' : ''}">${this.escapeHTML(task.name)}</td>
                        <td style="width: 150px;">
                            <span class="status-badge ${badgeClass}" onclick="app.toggleTaskStatus(${index})">
                                ${badgeText}
                            </span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                this.switchView('detail');
            },

            toggleTaskStatus(taskIndex) {
                const table = this.data.find(t => t.id === this.currentTableId);
                if (table) {
                    const currentStatus = table.tasks[taskIndex].status;
                    table.tasks[taskIndex].status = currentStatus === 'pending' ? 'completed' : 'pending';
                    this.saveData();
                    this.openTable(this.currentTableId); // Re-render table
                }
            },

            deleteCurrentTable() {
                if(confirm("Are you sure you want to delete this table?")) {
                    this.data = this.data.filter(t => t.id !== this.currentTableId);
                    this.saveData();
                    this.switchView('dashboard');
                }
            },

            escapeHTML(str) {
                return str.replace(/[&<>'"]/g, 
                    tag => ({
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        "'": '&#39;',
                        '"': '&quot;'
                    }[tag] || tag)
                );
            }
        };

        // Boot
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
