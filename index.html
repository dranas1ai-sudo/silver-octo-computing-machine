<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Planner - Ultra Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050508;
            --glass-bg: rgba(15, 15, 22, 0.55);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-cyan: #22d3ee;
            --accent-purple: #c084fc;
            --danger: #fb7185;
            --success: #34d399;
            --font-main: 'Outfit', sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-main);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            background-image: url('brain.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Overlay to make text readable against the GIF */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(5,5,8,0.7) 0%, rgba(0,0,0,0.9) 100%);
            z-index: -1;
            backdrop-filter: blur(2px);
        }

        /* --- Intro Loader --- */
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .pulse-ring {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--accent-cyan);
            animation: pulse 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.7); }
            70% { transform: scale(1.5); box-shadow: 0 0 0 20px rgba(34, 211, 238, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); }
        }

        /* --- UI Components --- */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5, 5, 8, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-main), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover, .btn:active {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--glass-highlight);
            transform: translateY(-2px);
        }

        .btn-glow {
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.1), rgba(192, 132, 252, 0.1));
            border-color: rgba(34, 211, 238, 0.3);
            color: var(--accent-cyan);
        }

        .btn-glow:hover {
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.2), rgba(192, 132, 252, 0.2));
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
        }

        main {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .view-section {
            display: none;
            opacity: 0;
            transform: translateY(15px) scale(0.98);
            transition: var(--transition-smooth);
        }

        .view-section.active {
            display: block;
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* --- Dashboard Grid --- */
        .header-action {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
        }

        .header-action h2 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .plan-card {
            padding: 24px;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .plan-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .plan-card:hover::before {
            transform: translateX(100%);
        }

        .plan-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-cyan);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), 0 0 20px rgba(34, 211, 238, 0.1);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .card-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .progress-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.8rem;
            font-weight: 600;
            background: conic-gradient(var(--accent-cyan) var(--p), rgba(255,255,255,0.05) 0deg);
            position: relative;
        }

        .progress-circle::after {
            content: "";
            position: absolute;
            inset: 4px;
            background: var(--bg-dark);
            border-radius: 50%;
        }
        .progress-circle span { position: relative; z-index: 1; }

        /* --- Forms & Inputs --- */
        .input-group { margin-bottom: 30px; }
        
        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .modern-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 16px 20px;
            border-radius: 16px;
            font-size: 1.05rem;
            transition: var(--transition-smooth);
        }

        .modern-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.1);
        }

        .task-builder {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .task-row {
            display: grid;
            grid-template-columns: 1fr 120px 50px;
            gap: 12px;
            align-items: center;
        }

        .btn-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: rgba(251, 113, 133, 0.1);
            color: var(--danger);
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .btn-icon:hover {
            background: var(--danger);
            color: #fff;
            box-shadow: 0 5px 15px rgba(251, 113, 133, 0.3);
        }

        /* --- Task List View (Detail) --- */
        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--glass-border);
            transition: var(--transition-smooth);
        }

        .task-item:last-child { border-bottom: none; }
        .task-item:hover { background: rgba(255, 255, 255, 0.05); }

        .task-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .task-time {
            color: var(--accent-purple);
            font-weight: 600;
            font-size: 0.95rem;
            background: rgba(192, 132, 252, 0.1);
            padding: 6px 12px;
            border-radius: 8px;
        }

        .task-name {
            font-size: 1.1rem;
            transition: var(--transition-smooth);
        }

        .task-name.done {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .toggle-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--glass-border);
            background: transparent;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition-smooth);
        }

        .toggle-btn.done {
            background: var(--success);
            border-color: var(--success);
            color: var(--bg-dark);
            box-shadow: 0 0 15px rgba(52, 211, 153, 0.4);
        }

        .toggle-btn::after {
            content: '✓';
            opacity: 0;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .toggle-btn.done::after { opacity: 1; }

        @media (max-width: 768px) {
            nav { padding: 15px 20px; }
            main { padding: 20px; }
            .task-row { grid-template-columns: 1fr; }
            .task-row .modern-input { width: 100%; }
            .task-info { flex-direction: column; align-items: flex-start; gap: 8px; }
            .header-action { flex-direction: column; align-items: flex-start; gap: 20px; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="pulse-ring"></div>
        <div style="color: var(--text-muted); font-size: 0.9rem; letter-spacing: 2px;">INITIALIZING SYSTEM</div>
    </div>

    <nav>
        <div class="brand-logo">Neural Planner</div>
        <button class="btn" onclick="app.switchView('create')">
            <span>+</span> New Plan
        </button>
    </nav>

    <main>
        <div id="view-dashboard" class="view-section active">
            <div class="header-action">
                <h2>My Architectures</h2>
            </div>
            <div id="tables-grid" class="grid"></div>
        </div>

        <div id="view-create" class="view-section">
            <div class="glass-panel" style="padding: 40px;">
                <div class="header-action" style="margin-bottom: 30px;">
                    <h2>Design New Routine</h2>
                    <button class="btn" onclick="app.switchView('dashboard')">Cancel</button>
                </div>
                
                <div class="input-group">
                    <label>Module Title</label>
                    <input type="text" id="table-title" class="modern-input" placeholder="e.g., Deep Work Protocol..." autocomplete="off">
                </div>

                <div class="input-group">
                    <label>Task Sequences</label>
                    <div id="task-list" class="task-builder"></div>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 40px;">
                    <button class="btn" style="flex: 1; border-style: dashed;" onclick="app.addTaskRow()">+ Add Sequence</button>
                    <button class="btn btn-glow" style="flex: 1;" onclick="app.saveTable()">Launch Protocol</button>
                </div>
            </div>
        </div>

        <div id="view-detail" class="view-section">
            <div class="header-action">
                <div>
                    <button class="btn" style="margin-bottom: 20px; padding: 8px 16px;" onclick="app.switchView('dashboard')">← Return</button>
                    <h2 id="detail-title">Plan Details</h2>
                </div>
                <button class="btn" style="color: var(--danger); border-color: rgba(251,113,133,0.3);" onclick="app.deleteCurrentTable()">Delete Protocol</button>
            </div>
            
            <div class="glass-panel" style="padding: 10px 0;">
                <div id="detail-body"></div>
            </div>
        </div>
    </main>

    <script>
        // --- Smart Audio Engine (Works on all mobile browsers) ---
        const sfx = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    this.ctx = new AudioContext();
                }
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            play(type) {
                this.init();
                if (!this.ctx) return;
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                const t = this.ctx.currentTime;
                if (type === 'tap') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, t);
                    osc.frequency.exponentialRampToValueAtTime(300, t + 0.05);
                    gain.gain.setValueAtTime(0.05, t);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
                    osc.start(t);
                    osc.stop(t + 0.05);
                } else if (type === 'done') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(400, t);
                    osc.frequency.setValueAtTime(600, t + 0.1);
                    osc.frequency.setValueAtTime(1000, t + 0.2);
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.05, t + 0.05);
                    gain.gain.linearRampToValueAtTime(0, t + 0.3);
                    osc.start(t);
                    osc.stop(t + 0.3);
                }
            }
        };

        // Initialize audio on first user interaction anywhere
        ['click', 'touchstart'].forEach(evt => 
            document.addEventListener(evt, () => sfx.init(), { once: true })
        );

        // --- Core App Logic ---
        const app = {
            data: [],
            currentId: null,

            init() {
                // Remove loader smoothly
                setTimeout(() => {
                    const loader = document.getElementById('loader');
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 800);
                }, 1500);

                this.load();
                this.renderDash();
                this.addTaskRow();
            },

            load() {
                const d = localStorage.getItem('ultraPlanner');
                if (d) this.data = JSON.parse(d);
            },

            save() {
                localStorage.setItem('ultraPlanner', JSON.stringify(this.data));
            },

            switchView(view) {
                sfx.play('tap');
                document.querySelectorAll('.view-section').forEach(v => {
                    v.classList.remove('active');
                    setTimeout(() => v.style.display = 'none', 400);
                });
                
                const target = document.getElementById(`view-${view}`);
                setTimeout(() => {
                    target.style.display = 'block';
                    // Trigger reflow
                    void target.offsetWidth; 
                    target.classList.add('active');
                }, 400);
                
                if (view === 'dashboard') this.renderDash();
                else if (view === 'create') {
                    document.getElementById('table-title').value = '';
                    document.getElementById('task-list').innerHTML = '';
                    this.addTaskRow();
                }
            },

            renderDash() {
                const grid = document.getElementById('tables-grid');
                grid.innerHTML = '';

                if (this.data.length === 0) {
                    grid.innerHTML = `
                        <div class="glass-panel" style="grid-column: 1/-1; padding: 60px 20px; text-align: center; color: var(--text-muted);">
                            <div style="font-size: 3rem; margin-bottom: 10px;">📋</div>
                            System empty. Initiate a new protocol.
                        </div>`;
                    return;
                }

                this.data.forEach(item => {
                    const done = item.tasks.filter(t => t.status === 'completed').length;
                    const total = item.tasks.length;
                    const pct = total ? Math.round((done / total) * 100) : 0;
                    
                    const card = document.createElement('div');
                    card.className = 'glass-panel plan-card';
                    card.onclick = () => { sfx.play('tap'); this.open(item.id); };
                    
                    // Dynamic color for progress
                    const color = pct === 100 ? 'var(--success)' : 'var(--accent-cyan)';
                    
                    card.innerHTML = `
                        <div class="card-top">
                            <div>
                                <div class="card-title">${this.esc(item.title)}</div>
                                <div class="card-date">${total} Nodes • ${done} Active</div>
                            </div>
                            <div class="progress-circle" style="--p: ${pct}%; --accent-cyan: ${color};">
                                <span>${pct}%</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            },

            addTaskRow() {
                sfx.play('tap');
                const list = document.getElementById('task-list');
                const row = document.createElement('div');
                row.className = 'task-row';
                row.innerHTML = `
                    <input type="text" class="modern-input t-name" placeholder="Define parameter..." required>
                    <input type="time" class="modern-input t-time" required>
                    <button class="btn-icon" onclick="sfx.play('tap'); this.parentElement.remove()">✕</button>
                `;
                list.appendChild(row);
            },

            saveTable() {
                const title = document.getElementById('table-title').value.trim() || `Protocol ${Math.floor(Math.random()*1000)}`;
                const rows = document.querySelectorAll('#task-list .task-row');
                const tasks = [];

                rows.forEach(r => {
                    const name = r.querySelector('.t-name').value.trim();
                    const time = r.querySelector('.t-time').value;
                    if (name) tasks.push({ name, time: time || 'Anytime', status: 'pending' });
                });

                if (!tasks.length) return alert("Must define at least one parameter.");

                sfx.play('done');
                this.data.unshift({ id: Date.now().toString(), title, tasks });
                this.save();
                this.switchView('dashboard');
            },

            open(id) {
                this.currentId = id;
                const item = this.data.find(i => i.id === id);
                if (!item) return;

                document.getElementById('detail-title').textContent = item.title;
                const body = document.getElementById('detail-body');
                body.innerHTML = '';

                item.tasks.forEach((t, idx) => {
                    const isDone = t.status === 'completed';
                    
                    const row = document.createElement('div');
                    row.className = 'task-item';
                    row.innerHTML = `
                        <div class="task-info">
                            <span class="task-time">${this.esc(t.time)}</span>
                            <span class="task-name ${isDone ? 'done' : ''}">${this.esc(t.name)}</span>
                        </div>
                        <button class="toggle-btn ${isDone ? 'done' : ''}" onclick="app.toggle(${idx})"></button>
                    `;
                    body.appendChild(row);
                });
                this.switchView('detail');
            },

            toggle(idx) {
                const item = this.data.find(i => i.id === this.currentId);
                if (item) {
                    const isNowDone = item.tasks[idx].status === 'pending';
                    item.tasks[idx].status = isNowDone ? 'completed' : 'pending';
                    sfx.play(isNowDone ? 'done' : 'tap');
                    this.save();
                    this.open(this.currentId);
                }
            },

            deleteCurrentTable() {
                if(confirm("Terminate this protocol forever?")) {
                    sfx.play('tap');
                    this.data = this.data.filter(i => i.id !== this.currentId);
                    this.save();
                    this.switchView('dashboard');
                }
            },

            esc(str) {
                return str.replace(/[&<>'"]/g, tag => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[tag]));
            }
        };

        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
