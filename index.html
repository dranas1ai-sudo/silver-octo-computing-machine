<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Planner - V5</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030305;
            --surface-color: rgba(20, 20, 30, 0.4);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary-color: #38bdf8; 
            --danger-color: #f43f5e;
            --success-color: #10b981;
            --font-en: 'Outfit', sans-serif;
            --font-ar: 'Tajawal', sans-serif;
            --transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html[dir="rtl"] { font-family: var(--font-ar); }
        html[dir="ltr"] { font-family: var(--font-en); }
        body { font-family: inherit; }

        body {
            background-color: var(--bg-color);
            background-image: url('./brain.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(5,5,8,0.7) 0%, rgba(0,0,0,0.85) 100%);
            z-index: -1;
            backdrop-filter: blur(3px);
        }

        /* --- Intro Animation --- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background-color: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeOutIntro 1s forwards;
            animation-delay: 2s;
        }

        .eyes-container { display: flex; gap: 40px; align-items: center; }
        .eye {
            width: 45px; height: 12px; background-color: var(--primary-color);
            border-radius: 50%; box-shadow: 0 0 25px 5px var(--primary-color);
            animation: pulseEye 2s infinite, blinkEye 4s infinite;
        }

        @keyframes pulseEye {
            0%, 100% { box-shadow: 0 0 15px 2px var(--primary-color); transform: scale(1); opacity: 0.8; }
            50% { box-shadow: 0 0 40px 10px var(--primary-color); transform: scale(1.05); opacity: 1; }
        }
        @keyframes blinkEye {
            0%, 96%, 98%, 100% { transform: scaleY(1); }
            97%, 99% { transform: scaleY(0.1); }
        }
        @keyframes fadeOutIntro { to { opacity: 0; visibility: hidden; } }

        /* --- Toast Notifications --- */
        .toast-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .toast {
            background: rgba(20, 20, 30, 0.9); backdrop-filter: blur(10px);
            border: 1px solid var(--surface-border); color: white;
            padding: 12px 24px; border-radius: 30px; font-size: 0.95rem; font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease forwards, fadeOut 0.3s ease 2.7s forwards;
            display: flex; align-items: center; gap: 10px;
        }
        .toast.error { border-color: var(--danger-color); box-shadow: 0 5px 20px rgba(244, 63, 94, 0.2); }
        .toast.success { border-color: var(--success-color); box-shadow: 0 5px 20px rgba(16, 185, 129, 0.2); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }

        /* --- Glassmorphism UI --- */
        .glass {
            background: var(--surface-color); backdrop-filter: blur(20px);
            border: 1px solid var(--surface-border); border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; position: sticky; top: 0; z-index: 100;
            background: rgba(3, 3, 5, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid var(--surface-border);
        }

        .brand h1 { font-size: 1.4rem; font-weight: 700; color: var(--primary-color); }
        .brand span { font-size: 0.75rem; color: var(--text-secondary); }

        .nav-actions { display: flex; gap: 10px; align-items: center; }

        button { cursor: pointer; border: none; outline: none; font-family: inherit; transition: var(--transition); }
        .btn-primary {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--surface-border);
            color: white; padding: 10px 20px; border-radius: 12px; font-weight: 500; font-size: 0.9rem;
        }
        .btn-primary:hover { background: rgba(56, 189, 248, 0.1); border-color: var(--primary-color); transform: translateY(-2px); }
        
        .btn-lang {
            background: transparent; border: 1px solid var(--surface-border); color: white;
            padding: 8px 12px; border-radius: 10px; font-weight: bold;
        }
        .btn-lang:hover { background: rgba(255,255,255,0.1); }

        main { padding: 40px 5%; max-width: 1000px; margin: 0 auto; }

        .view { display: none; opacity: 0; transform: translateY(15px); transition: var(--transition); }
        .view.active { display: block; opacity: 1; transform: translateY(0); }

        /* --- Cards --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { padding: 24px; cursor: pointer; display: flex; flex-direction: column; gap: 15px; }
        .card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); background: rgba(30, 30, 40, 0.6); }
        
        .progress-circle {
            width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 0.75rem; font-weight: bold; background: conic-gradient(var(--success-color) var(--p), rgba(255,255,255,0.1) 0deg);
        }
        .progress-circle::after { content: ""; position: absolute; inset: 4px; background: var(--bg-color); border-radius: 50%; }
        .progress-circle span { position: relative; z-index: 1; }

        /* --- Forms --- */
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); }
        input {
            width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--surface-border);
            color: white; padding: 14px; border-radius: 12px; transition: var(--transition); font-family: inherit;
        }
        input:focus { border-color: var(--primary-color); outline: none; }
        
        .task-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .task-row input[type="text"] { flex: 2; }
        .task-row input[type="time"] { flex: 1; }
        .btn-icon { width: 45px; height: 45px; border-radius: 10px; background: rgba(244,63,94,0.1); color: var(--danger-color); }

        /* --- Task Detail --- */
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--surface-border); }
        .task-item:last-child { border-bottom: none; }
        .task-info { display: flex; gap: 15px; align-items: center; }
        .task-time { color: #c084fc; background: rgba(192, 132, 252, 0.1); padding: 5px 10px; border-radius: 8px; font-size: 0.85rem; }
        .task-name.done { text-decoration: line-through; color: var(--text-secondary); }
        
        .toggle-btn {
            width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--surface-border);
            display: flex; justify-content: center; align-items: center; background: transparent;
        }
        .toggle-btn.done { background: var(--success-color); border-color: var(--success-color); color: #000; }
        .toggle-btn.done::after { content: '✓'; font-weight: bold; }

        @media (max-width: 768px) {
            .task-row { flex-direction: column; }
            .task-row input, .task-row .btn-icon { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="eyes-container"><div class="eye"></div><div class="eye"></div></div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <nav>
        <div class="brand">
            <h1 data-i18n="title">Neural Planner</h1>
            <span data-i18n="subtitle">V5 Ultimate • Mohammed Anas</span>
        </div>
        <div class="nav-actions">
            <button class="btn-lang" onclick="app.toggleLang()" id="langBtn">AR</button>
            <button class="btn-primary" onclick="app.switchView('dashboard')" data-i18n="home">Home</button>
        </div>
    </nav>

    <main>
        <div id="view-dashboard" class="view active">
            <div style="display: flex; justify-content: space-between; margin-bottom: 30px;">
                <h2 data-i18n="yourRoutines">Your Routine Architectures</h2>
                <button class="btn-primary" onclick="app.switchView('create')" data-i18n="newPlan">+ New Plan</button>
            </div>
            <div id="tables-grid" class="grid"></div>
        </div>

        <div id="view-create" class="view glass" style="padding: 30px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 25px;">
                <h2 data-i18n="designPlan">Design New Plan</h2>
                <button class="btn-primary" style="color:var(--danger-color); border-color:rgba(244,63,94,0.3);" onclick="app.switchView('dashboard')" data-i18n="cancel">Cancel</button>
            </div>
            
            <div class="input-group">
                <label data-i18n="moduleTitle">Module Title</label>
                <input type="text" id="table-title" data-i18n-ph="titlePlaceholder" placeholder="e.g., Deep Work Protocol...">
            </div>

            <div class="input-group">
                <label data-i18n="defineSeq">Define Parameter Sequence</label>
                <div id="task-list"></div>
                <button class="btn-primary" style="width: 100%; margin-top: 15px; border-style: dashed;" onclick="app.addTaskRow()" data-i18n="addNode">+ Add New Node</button>
            </div>

            <div style="text-align: end; margin-top: 30px;">
                <button class="btn-primary" style="background: var(--primary-color); color: #000;" onclick="app.saveTable()" data-i18n="launch">Launch Routine ✓</button>
            </div>
        </div>

        <div id="view-detail" class="view">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <div>
                    <button class="btn-primary" style="margin-bottom: 10px;" onclick="app.switchView('dashboard')" data-i18n="back">← Back</button>
                    <h2 id="detail-title">Plan Details</h2>
                </div>
                <button class="btn-primary" style="color:var(--danger-color); border-color:rgba(244,63,94,0.3);" onclick="app.deleteCurrentTable()" data-i18n="delete">🗑 Delete</button>
            </div>
            <div class="glass" id="detail-body"></div>
        </div>
    </main>

    <script>
        // --- Translations System ---
        const translations = {
            en: {
                title: "Neural Planner", subtitle: "V5 Ultimate • Mohammed Anas",
                home: "Home", newPlan: "+ New Plan", yourRoutines: "Your Routine Architectures",
                noRoutines: "No routine architectures initialized. System is ready.",
                designPlan: "Design New Plan", cancel: "Cancel", moduleTitle: "Module Title",
                titlePlaceholder: "e.g., Deep Work Protocol...", defineSeq: "Define Tasks",
                addNode: "+ Add New Task", taskPlaceholder: "Task description...",
                launch: "Launch Routine ✓", back: "← Back", delete: "🗑 Delete Plan",
                emptyAlert: "System must define at least one task to save.",
                confirmDelete: "Permanently delete this plan?"
            },
            ar: {
                title: "المخطط العصبي", subtitle: "الإصدار الخامس • محمد أنس",
                home: "الرئيسية", newPlan: "+ خطة جديدة", yourRoutines: "خططك اليومية",
                noRoutines: "لا توجد خطط حالياً. النظام جاهز للعمل.",
                designPlan: "تصميم خطة جديدة", cancel: "إلغاء", moduleTitle: "عنوان الخطة",
                titlePlaceholder: "مثال: روتين العمل العميق...", defineSeq: "قائمة المهام",
                addNode: "+ إضافة مهمة جديدة", taskPlaceholder: "اكتب تفاصيل المهمة هنا...",
                launch: "حفظ الخطة ✓", back: "← رجوع", delete: "🗑 حذف الخطة",
                emptyAlert: "عفواً، يجب كتابة مهمة واحدة على الأقل قبل الحفظ!",
                confirmDelete: "هل أنت متأكد من الحذف النهائي لهذه الخطة؟"
            }
        };

        const audio = {
            ctx: null,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            play(type) {
                this.init(); if (!this.ctx) return;
                const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                const t = this.ctx.currentTime;
                if (type === 'tap') {
                    osc.frequency.setValueAtTime(600, t); osc.frequency.exponentialRampToValueAtTime(300, t+0.05);
                    gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.001, t+0.05);
                    osc.start(t); osc.stop(t+0.05);
                } else if (type === 'success') {
                    osc.frequency.setValueAtTime(400, t); osc.frequency.setValueAtTime(800, t+0.1);
                    gain.gain.setValueAtTime(0.05, t); gain.gain.linearRampToValueAtTime(0, t+0.3);
                    osc.start(t); osc.stop(t+0.3);
                }
            }
        };

        ['click', 'touchstart'].forEach(e => document.addEventListener(e, () => audio.init(), {once:true}));

        const app = {
            data: [], currentId: null, lang: localStorage.getItem('appLang') || 'en',

            init() {
                setTimeout(() => document.getElementById('intro-overlay')?.remove(), 2500);
                this.applyLang();
                const stored = localStorage.getItem('plannerV5');
                if (stored) this.data = JSON.parse(stored);
                this.switchView('dashboard');
            },

            showToast(msgKey, type = 'success') {
                const msg = translations[this.lang][msgKey] || msgKey;
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `${type === 'success' ? '✅' : '⚠️'} ${msg}`;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            },

            toggleLang() {
                audio.play('tap');
                this.lang = this.lang === 'en' ? 'ar' : 'en';
                localStorage.setItem('appLang', this.lang);
                this.applyLang();
                if(document.getElementById('view-dashboard').classList.contains('active')) this.renderDash();
                else if(document.getElementById('view-create').classList.contains('active')) this.updatePlaceholders();
            },

            applyLang() {
                document.documentElement.dir = this.lang === 'ar' ? 'rtl' : 'ltr';
                document.documentElement.lang = this.lang;
                document.getElementById('langBtn').innerText = this.lang === 'en' ? 'AR' : 'EN';
                
                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if (translations[this.lang][key]) el.innerHTML = translations[this.lang][key];
                });
                this.updatePlaceholders();
            },

            updatePlaceholders() {
                document.querySelectorAll('[data-i18n-ph]').forEach(el => {
                    const key = el.getAttribute('data-i18n-ph');
                    if (translations[this.lang][key]) el.placeholder = translations[this.lang][key];
                });
            },

            switchView(view) {
                audio.play('tap');
                document.querySelectorAll('.view').forEach(v => { v.classList.remove('active'); setTimeout(() => v.style.display='none', 300); });
                const target = document.getElementById(`view-${view}`);
                setTimeout(() => { target.style.display='block'; void target.offsetWidth; target.classList.add('active'); }, 300);
                
                if (view === 'dashboard') this.renderDash();
                else if (view === 'create') {
                    document.getElementById('table-title').value = '';
                    document.getElementById('task-list').innerHTML = '';
                    this.addTaskRow();
                }
            },

            renderDash() {
                const grid = document.getElementById('tables-grid');
                grid.innerHTML = '';
                if (!this.data.length) {
                    grid.innerHTML = `<div class="glass" style="grid-column:1/-1; padding:40px; text-align:center; color:var(--text-secondary);">${translations[this.lang].noRoutines}</div>`;
                    return;
                }
                this.data.forEach(item => {
                    const done = item.tasks.filter(t => t.status === 'completed').length;
                    const total = item.tasks.length;
                    const pct = total ? Math.round((done/total)*100) : 0;
                    
                    const card = document.createElement('div');
                    card.className = 'card glass';
                    card.onclick = () => { audio.play('tap'); this.open(item.id); };
                    card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--surface-border); padding-bottom:10px;">
                            <div style="font-size:1.1rem; font-weight:600;">${this.esc(item.title)}</div>
                            <div class="progress-circle" style="--p:${pct}%"><span>${pct}%</span></div>
                        </div>
                        <div style="color:var(--text-secondary); font-size:0.9rem; margin-top:10px;">
                            ${total} Tasks • ${done} Completed
                        </div>
                    `;
                    grid.appendChild(card);
                });
            },

            addTaskRow() {
                audio.play('tap');
                const list = document.getElementById('task-list');
                const row = document.createElement('div');
                row.className = 'task-row';
                const placeholder = translations[this.lang].taskPlaceholder;
                row.innerHTML = `
                    <input type="text" class="t-name" placeholder="${placeholder}" required>
                    <input type="time" class="t-time" required>
                    <button class="btn-icon" onclick="audio.play('tap'); this.parentElement.remove()">✕</button>
                `;
                list.appendChild(row);
            },

            saveTable() {
                const title = document.getElementById('table-title').value.trim() || `Plan ${Math.floor(Math.random()*1000)}`;
                const rows = document.querySelectorAll('#task-list .task-row');
                const tasks = [];

                rows.forEach(r => {
                    const name = r.querySelector('.t-name').value.trim();
                    const time = r.querySelector('.t-time').value;
                    // لن يحفظ المهمة إذا كانت فارغة
                    if (name) tasks.push({ name, time: time || '--:--', status: 'pending' });
                });

                // إذا لم يتم كتابة أي مهمة، نعرض إشعار أنيق بدلاً من رسالة الخطأ المزعجة
                if (tasks.length === 0) {
                    this.showToast('emptyAlert', 'error');
                    return;
                }

                audio.play('success');
                this.data.unshift({ id: Date.now().toString(), title, tasks });
                localStorage.setItem('plannerV5', JSON.stringify(this.data));
                this.switchView('dashboard');
                this.showToast(this.lang === 'ar' ? 'تم حفظ الخطة بنجاح!' : 'Plan saved successfully!', 'success');
            },

            open(id) {
                this.currentId = id;
                const item = this.data.find(i => i.id === id);
                if (!item) return;

                document.getElementById('detail-title').textContent = item.title;
                const body = document.getElementById('detail-body');
                body.innerHTML = '';

                item.tasks.forEach((t, idx) => {
                    const isDone = t.status === 'completed';
                    const row = document.createElement('div');
                    row.className = 'task-item';
                    row.innerHTML = `
                        <div class="task-info">
                            <span class="task-time">${this.esc(t.time)}</span>
                            <span class="task-name ${isDone ? 'done' : ''}">${this.esc(t.name)}</span>
                        </div>
                        <button class="toggle-btn ${isDone ? 'done' : ''}" onclick="app.toggle(${idx})"></button>
                    `;
                    body.appendChild(row);
                });
                this.switchView('detail');
            },

            toggle(idx) {
                const item = this.data.find(i => i.id === this.currentId);
                if (item) {
                    const isDone = item.tasks[idx].status === 'pending';
                    item.tasks[idx].status = isDone ? 'completed' : 'pending';
                    audio.play(isDone ? 'success' : 'tap');
                    localStorage.setItem('plannerV5', JSON.stringify(this.data));
                    this.open(this.currentId);
                }
            },

            deleteCurrentTable() {
                if(confirm(translations[this.lang].confirmDelete)) {
                    audio.play('tap');
                    this.data = this.data.filter(i => i.id !== this.currentId);
                    localStorage.setItem('plannerV5', JSON.stringify(this.data));
                    this.switchView('dashboard');
                }
            },

            esc(str) { return str.replace(/[&<>'"]/g, tag => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[tag])); }
        };

        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
