<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Planner - V9 Ultimate Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030305;
            --surface-color: rgba(20, 20, 30, 0.45);
            --surface-border: rgba(255, 255, 255, 0.12);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary-color: #0ea5e9; 
            --danger-color: #f43f5e;
            --success-color: #10b981;
            --font-en: 'Outfit', sans-serif;
            --font-ar: 'Tajawal', sans-serif;
            --transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html[dir="rtl"] { font-family: var(--font-ar); }
        html[dir="ltr"] { font-family: var(--font-en); }
        body { font-family: inherit; color: var(--text-primary); overflow-x: hidden; min-height: 100vh; background-color: var(--bg-color); }

        #brain-bg {
            position: fixed; inset: 0; z-index: -2;
            background-image: url('brain.gif');
            background-size: cover; background-position: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.8s ease;
        }
        
        #brain-overlay {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 0%, rgba(5,5,8,0.7) 0%, rgba(0,0,0,0.85) 100%);
            backdrop-filter: blur(3px);
            transition: background 0.8s ease;
        }

        .brain-pulse { transform: scale(1.1); filter: brightness(1.5) contrast(1.2); }
        .overlay-pulse { background: radial-gradient(circle at 50% 0%, rgba(56, 189, 248, 0.5) 0%, rgba(0,0,0,0.8) 100%) !important; }

        #intro-overlay {
            position: fixed; inset: 0; background-color: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            animation: fadeOutIntro 1s forwards; animation-delay: 2s;
        }
        .eyes-container { display: flex; gap: 40px; align-items: center; }
        .eye {
            width: 45px; height: 12px; background-color: var(--primary-color);
            border-radius: 50%; box-shadow: 0 0 25px 5px var(--primary-color);
            animation: pulseEye 2s infinite, blinkEye 4s infinite;
        }
        @keyframes pulseEye {
            0%, 100% { box-shadow: 0 0 15px 2px var(--primary-color); transform: scale(1); opacity: 0.8; }
            50% { box-shadow: 0 0 40px 10px var(--primary-color); transform: scale(1.05); opacity: 1; }
        }
        @keyframes blinkEye { 0%, 96%, 98%, 100% { transform: scaleY(1); } 97%, 99% { transform: scaleY(0.1); } }
        @keyframes fadeOutIntro { to { opacity: 0; visibility: hidden; } }

        .toast-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .toast {
            background: rgba(20, 20, 30, 0.9); backdrop-filter: blur(10px);
            border: 1px solid var(--surface-border); color: white;
            padding: 12px 24px; border-radius: 30px; font-size: 0.95rem; font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease forwards, fadeOut 0.3s ease 2.7s forwards;
        }
        .toast.error { border-color: var(--danger-color); box-shadow: 0 5px 20px rgba(244, 63, 94, 0.2); }
        .toast.success { border-color: var(--success-color); box-shadow: 0 5px 20px rgba(16, 185, 129, 0.2); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }

        .glass {
            background: var(--surface-color); backdrop-filter: blur(20px);
            border: 1px solid var(--surface-border); border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; position: sticky; top: 0; z-index: 100;
            background: rgba(3, 3, 5, 0.6); backdrop-filter: blur(20px); border-bottom: 1px solid var(--surface-border);
        }

        .brand h1 { font-size: 1.4rem; font-weight: 700; color: var(--primary-color); }
        .brand span { font-size: 0.75rem; color: var(--text-secondary); }
        .nav-actions { display: flex; gap: 12px; align-items: center; }

        button { cursor: pointer; border: none; outline: none; font-family: inherit; transition: var(--transition); }
        
        .btn-primary {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--surface-border);
            color: white; padding: 10px 20px; border-radius: 12px; font-weight: 500; font-size: 0.9rem;
        }
        .btn-primary:hover { background: rgba(56, 189, 248, 0.1); border-color: var(--primary-color); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56,189,248,0.2); }
        
        .btn-lang {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.03); border: 1px solid var(--surface-border);
            color: white; padding: 8px 16px; border-radius: 30px; font-weight: bold; font-size: 0.85rem;
        }
        .btn-lang:hover { background: rgba(255,255,255,0.1); border-color: var(--primary-color); transform: scale(1.05); }
        .btn-lang svg { width: 16px; height: 16px; fill: currentColor; }

        main { padding: 40px 5%; max-width: 1000px; margin: 0 auto; }
        .view { display: none; opacity: 0; transform: translateY(15px); transition: var(--transition); }
        .view.active { display: block; opacity: 1; transform: translateY(0); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { padding: 24px; cursor: pointer; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); background: rgba(30, 30, 40, 0.6); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(56, 189, 248, 0.1); }

        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); }
        input {
            width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--surface-border);
            color: white; padding: 14px; border-radius: 12px; transition: var(--transition); font-family: inherit;
        }
        input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 3px rgba(56,189,248,0.2); }
        
        .task-row-input { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
        .task-row-input input[type="text"] { flex: 2; }
        .task-row-input input[type="time"] { flex: 1; }
        .btn-icon { width: 45px; height: 45px; flex-shrink: 0; border-radius: 10px; background: rgba(244,63,94,0.1); color: var(--danger-color); }
        .btn-icon:hover { background: var(--danger-color); color: white; }

        /* --- Smooth Color-coded Table Style --- */
        .table-container { padding: 10px; overflow: hidden; }
        
        .table-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; border-radius: 15px; background: #0a0a0f; 
            margin-bottom: 10px; border: 1px solid var(--surface-border);
        }
        .table-header .title { font-size: 1.3rem; font-weight: bold; }
        .table-header .done { color: var(--text-secondary); }

        .table-body { border-radius: 15px; border: 1px solid var(--surface-border); background: #0a0a0f; }

        .task-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 25px; border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: var(--transition); cursor: pointer;
        }
        .task-row:last-child { border-bottom: none; }
        .task-row:hover { background: rgba(255,255,255,0.02); }

        .task-info { display: flex; gap: 15px; align-items: center; }
        .task-time { color: var(--text-secondary); }
        .task-name { font-size: 1.1rem; }

        /* Custom smooth checkbox */
        .custom-checkbox {
            width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--text-secondary);
            position: relative; transition: var(--transition); cursor: pointer; background: transparent;
        }
        .custom-checkbox::after {
            content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px;
            background: transparent; border-radius: 50%; transition: var(--transition); transform: scale(0);
        }
        input[type="checkbox"] { display: none; }
        input[type="checkbox"]:checked + .custom-checkbox::after { transform: scale(1); }

        /* Red Theme */
        .red-theme .table-header, .red-theme .table-body, .red-theme .task-row { border-color: rgba(244,63,94,0.3); }
        .red-theme .custom-checkbox { border-color: var(--danger-color); }
        .red-theme input[type="checkbox"]:checked + .custom-checkbox::after { background: var(--danger-color); }
        .red-theme .task-row:hover { background: rgba(244,63,94,0.05); }

        /* Green Theme */
        .green-theme .table-header, .green-theme .table-body, .green-theme .task-row { border-color: rgba(16,185,129,0.3); }
        .green-theme .custom-checkbox { border-color: var(--success-color); }
        .green-theme input[type="checkbox"]:checked + .custom-checkbox::after { background: var(--success-color); }
        .green-theme .task-row:hover { background: rgba(16,185,129,0.05); }

        @media (max-width: 768px) {
            .task-row-input { flex-direction: column; }
            .task-row-input input, .task-row-input .btn-icon { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="brain-bg"></div>
    <div id="brain-overlay"></div>

    <div id="intro-overlay">
        <div class="eyes-container"><div class="eye"></div><div class="eye"></div></div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <nav>
        <div class="brand">
            <h1 data-i18n="title">Neural Planner Pro</h1>
            <span data-i18n="subtitle">Version 9 • Color Coded Tables</span>
        </div>
        <div class="nav-actions">
            <button class="btn-lang" onclick="app.toggleLang()">
                <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2s.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c.96-1.66 2.49-2.93 4.33-3.56C8.81 5.55 8.35 6.75 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2s.07-1.35.16-2h4.68c.09.65.16 1.32.16 2s-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2s-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/></svg>
                <span id="langBtnText">EN</span>
            </button>
            <button class="btn-primary" onclick="app.switchView('dashboard')" data-i18n="home">Home</button>
        </div>
    </nav>

    <main>
        <div id="view-dashboard" class="view active">
            <div style="display: flex; justify-content: space-between; margin-bottom: 30px; align-items: center;">
                <h2 data-i18n="yourRoutines">Your Routines</h2>
                <button class="btn-primary" onclick="app.switchView('create')" data-i18n="newPlan" style="border: 1px dashed var(--primary-color);">+ New Plan</button>
            </div>
            <div id="tables-grid" class="grid"></div>
        </div>

        <div id="view-create" class="view glass" style="padding: 35px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 25px; align-items: center;">
                <h2 data-i18n="designPlan">Design New Plan</h2>
                <button class="btn-primary" style="color:var(--danger-color); border-color:rgba(244,63,94,0.3); background: rgba(244,63,94,0.05);" onclick="app.switchView('dashboard')" data-i18n="cancel">Cancel</button>
            </div>
            
            <div class="input-group">
                <label data-i18n="moduleTitle">Module Title</label>
                <input type="text" id="table-title" data-i18n-ph="titlePlaceholder" placeholder="e.g., Deep Work Protocol...">
            </div>

            <div class="input-group">
                <label data-i18n="defineSeq">Define Tasks</label>
                <div id="task-list-inputs"></div>
                <button class="btn-primary" style="width: 100%; margin-top: 15px; border-style: dashed; padding: 12px;" onclick="app.addTaskRowInput()" data-i18n="addNode">+ Add New Task</button>
            </div>

            <div style="text-align: end; margin-top: 35px; border-top: 1px solid var(--surface-border); padding-top: 25px;">
                <button class="btn-primary" style="background: var(--primary-color); color: #000; font-weight: bold; padding: 12px 30px;" onclick="app.saveTable()" data-i18n="launch">Launch Routine ✓</button>
            </div>
        </div>

        <div id="view-detail" class="view table-container glass">
            <button class="btn-primary" onclick="app.switchView('dashboard')" style="margin-bottom: 20px;">← Back</button>
            <div id="table-content"></div>
        </div>
    </main>

    <script>
        const translations = {
            en: {
                title: "Neural Planner Pro", subtitle: "Version 9 • Color Coded Tables",
                home: "Home", newPlan: "+ New Plan", yourRoutines: "Your Routines",
                noRoutines: "No routines initialized. System is ready.",
                designPlan: "Design New Plan", cancel: "Cancel", moduleTitle: "Module Title",
                titlePlaceholder: "e.g., Deep Work Protocol...", defineSeq: "Define Tasks",
                addNode: "+ Add New Task", taskPlaceholder: "Task description...",
                launch: "Launch Routine ✓", done: "Done"
            },
            ar: {
                title: "المخطط العصبي", subtitle: "النسخة 9 • جداول ملونة",
                home: "الرئيسية", newPlan: "+ خطة جديدة", yourRoutines: "خططك اليومية",
                noRoutines: "لا توجد خطط حالياً. النظام جاهز للعمل.",
                designPlan: "تصميم خطة جديدة", cancel: "إلغاء", moduleTitle: "عنوان الخطة",
                titlePlaceholder: "مثال: روتين العمل العميق...", defineSeq: "قائمة المهام",
                addNode: "+ إضافة مهمة جديدة", taskPlaceholder: "اكتب تفاصيل المهمة هنا...",
                launch: "حفظ الخطة ✓", done: "مكتملة"
            }
        };

        const app = {
            data: JSON.parse(localStorage.getItem('np9')) || [],
            lang: localStorage.getItem('lang') || 'en',
            currentId: null,

            init() {
                setTimeout(() => document.getElementById('intro-overlay')?.remove(), 2500);
                this.applyLang();
                this.render();
            },

            applyLang() {
                document.documentElement.dir = this.lang === 'ar' ? 'rtl' : 'ltr';
                document.getElementById('langBtnText').innerText = this.lang === 'en' ? 'AR' : 'EN';
                document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = translations[this.lang][el.getAttribute('data-i18n')]);
                document.querySelectorAll('[data-i18n-ph]').forEach(el => el.placeholder = translations[this.lang][el.getAttribute('data-i18n-ph')]);
            },

            toggleLang() { this.lang = this.lang === 'en' ? 'ar' : 'en'; localStorage.setItem('lang', this.lang); this.init(); },

            switchView(v) { document.querySelectorAll('.view').forEach(el => el.classList.remove('active')); document.getElementById('view-'+v).classList.add('active'); if(v==='create') { document.getElementById('task-list-inputs').innerHTML = ''; this.addTaskRowInput(); } },

            addTaskRowInput() {
                const div = document.createElement('div'); div.className = 'task-row-input';
                const placeholder = translations[this.lang].taskPlaceholder;
                div.innerHTML = `<input type="text" class="t-n" placeholder="${placeholder}"><input type="time" class="t-t"><button class="btn-icon" onclick="this.parentElement.remove()">✕</button>`;
                document.getElementById('task-list-inputs').appendChild(div);
            },

            saveTable() {
                const title = document.getElementById('table-title').value || "Routine";
                const tasks = [];
                document.querySelectorAll('#task-list-inputs div').forEach(row => {
                    const name = row.querySelector('.t-n').value;
                    const time = row.querySelector('.t-t').value;
                    if(name) tasks.push({ name, time: time || '--:--', done: false });
                });
                if(tasks.length === 0) return;
                this.data.unshift({ id: Date.now(), title, tasks });
                this.save(); this.switchView('dashboard'); this.render();
            },

            save() { localStorage.setItem('np9', JSON.stringify(this.data)); },

            render() {
                const container = document.getElementById('tables-grid'); container.innerHTML = '';
                if (!this.data.length) { container.innerHTML = `<div class="glass" style="grid-column:1/-1; padding:50px; text-align:center; color:var(--text-secondary);">${translations[this.lang].noRoutines}</div>`; return; }
                this.data.forEach(p => {
                    const doneCount = p.tasks.filter(t => t.done).length;
                    const totalCount = p.tasks.length;
                    const div = document.createElement('div'); div.className = 'glass card';
                    div.onclick = () => this.openPlan(p.id);
                    div.innerHTML = `<h3>${p.title}</h3><p style="font-size:0.9rem; color:var(--text-secondary); margin-top:10px;">${doneCount}/${totalCount} ${translations[this.lang].done}</p>`;
                    container.appendChild(div);
                });
            },

            openPlan(id) {
                this.currentId = id; const p = this.data.find(x => x.id === id);
                const doneCount = p.tasks.filter(t => t.done).length;
                
                // Color theme logic (simple alternate demo)
                const themeClass = this.data.indexOf(p) % 2 === 0 ? 'green-theme' : 'red-theme';
                document.getElementById('view-detail').className = 'view table-container glass active ' + themeClass;

                let tasksHtml = '';
                p.tasks.forEach((t, i) => {
                    tasksHtml += `
                        <div class="task-row" onclick="app.toggleTask(${i})">
                            <div class="task-info">
                                <span class="task-time">${t.time}</span>
                                <span class="task-name">${t.name}</span>
                            </div>
                            <label onclick="event.stopPropagation()">
                                <input type="checkbox" ${t.done ? 'checked' : ''} onchange="app.toggleTask(${i})">
                                <span class="custom-checkbox"></span>
                            </label>
                        </div>
                    `;
                });

                document.getElementById('table-content').innerHTML = `
                    <div class="table-header">
                        <span class="title">${p.title}</span>
                        <span class="done">${doneCount}/${p.tasks.length} ${translations[this.lang].done}</span>
                    </div>
                    <div class="table-body">${tasksHtml}</div>
                `;
                this.switchView('detail');
            },

            toggleTask(i) {
                const p = this.data.find(x => x.id === this.currentId);
                p.tasks[i].done = !p.tasks[i].done;
                this.save(); this.openPlan(this.currentId); // re-render to update Done count
            }
        };

        app.init();
    </script>
</body>
</html>
